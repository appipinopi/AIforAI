<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>カイ AI v6</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#070910;--s1:#0b0d18;--s2:#10131e;--s3:#151929;
  --bd:#1b2236;--bd2:#212d45;
  --blue:#4f8ef7;--green:#1ed98a;--pink:#f74e7d;
  --yellow:#f5c031;--purple:#9b7cf8;--orange:#f97316;
  --text:#bfcfe8;--dim:#3a506a;--dim2:#5a7090;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --r:9px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(79,142,247,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.02) 1px,transparent 1px);background-size:42px 42px}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;gap:10px;padding:9px 15px;background:rgba(11,13,24,.98);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:50;backdrop-filter:blur(12px)}
.logo{font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ver{font-family:var(--mono);font-size:9px;color:var(--dim2);border:1px solid var(--bd);padding:2px 6px;border-radius:20px;letter-spacing:1px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pu 2s ease-in-out infinite;flex-shrink:0}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
#mode-chip{font-family:var(--mono);font-size:9px;padding:2px 9px;border-radius:20px;border:1px solid var(--bd);color:var(--dim2);letter-spacing:1px;transition:all .3s}
#mode-chip.active{color:var(--yellow);border-color:var(--yellow);background:rgba(245,192,49,.07)}
#mode-chip.skill{color:var(--purple);border-color:var(--purple);background:rgba(155,124,248,.07)}
.hbtns{display:flex;gap:6px;margin-left:auto}
.hbtn{padding:5px 11px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--dim2);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all .2s;letter-spacing:.3px}
.hbtn:hover{border-color:var(--blue);color:var(--blue)}
.hbtn.skill-btn:hover{border-color:var(--purple);color:var(--purple)}

/* ── LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:240px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:width .25s,opacity .25s;overflow:hidden}
#sidebar.closed{width:0;opacity:0}
.stabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.stab{flex:1;padding:8px 2px;border:none;background:none;font-size:10px;font-family:var(--sans);letter-spacing:.5px;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.stab:hover{color:var(--text)}
.stab.on{color:var(--blue);border-bottom-color:var(--blue)}
.spanel{display:none;flex:1;overflow-y:auto;padding:10px;flex-direction:column;gap:7px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.spanel.on{display:flex}

/* sidebar cards */
.scard{padding:9px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;transition:all .2s}
.scard:hover{border-color:var(--blue);background:rgba(79,142,247,.05)}
.sc-n{font-size:12px;font-weight:500;margin-bottom:2px}
.sc-l{font-family:var(--mono);font-size:9px;color:var(--blue);letter-spacing:1px}
.sc-k{font-size:10px;color:var(--dim);margin-top:2px}
.sc-s{font-size:10px;color:var(--yellow);margin-top:3px}
.sc-del{float:right;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px}
.sc-del:hover{color:var(--pink)}
.s-empty{color:var(--dim);font-size:11px;text-align:center;padding:20px 0;line-height:1.8}

/* ── SKILL CARDS in sidebar ── */
.skill-card{padding:10px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);transition:all .2s}
.skill-card.enabled{border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.04)}
.sk-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sk-icon{font-size:16px;flex-shrink:0}
.sk-name{font-size:12px;font-weight:600;flex:1}
.sk-toggle{
  width:32px;height:18px;border-radius:99px;border:none;cursor:pointer;
  background:var(--bd2);position:relative;transition:background .2s;flex-shrink:0;
}
.sk-toggle::after{content:'';position:absolute;top:3px;left:3px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s}
.sk-toggle.on{background:var(--blue)}
.sk-toggle.on::after{transform:translateX(14px)}
.sk-desc{font-size:10px;color:var(--dim);line-height:1.5}
.sk-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.sk-tag{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(155,124,248,.12);color:var(--purple);border:1px solid rgba(155,124,248,.2)}
.sk-source{font-size:9px;color:var(--dim);margin-top:4px;font-family:var(--mono)}

/* gh import */
.gh-import-box{padding:10px;border-radius:7px;border:1px dashed var(--bd2);background:var(--s3)}
.gh-import-box label{font-size:10px;color:var(--dim2);display:block;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.gh-import-box input{width:100%;padding:7px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--text);font-size:11px;font-family:var(--mono);outline:none;transition:border .2s;margin-bottom:6px}
.gh-import-box input:focus{border-color:var(--green)}
.gh-import-btn{width:100%;padding:7px;border-radius:6px;border:none;background:var(--green);color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s}
.gh-import-btn:hover{filter:brightness(1.1)}
#import-status{font-size:10px;margin-top:5px;min-height:14px;font-family:var(--mono)}

/* ── CHAT ── */
#chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:13px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

.msg{display:flex;gap:9px;opacity:0;animation:fu .26s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:72%}
.msg.ai{align-self:flex-start;max-width:96%}
.ava{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.5px}
.msg.user .ava{background:var(--blue);color:#000}
.msg.ai   .ava{background:linear-gradient(135deg,#1a3a88,#0b6440);color:#fff}
.bub{padding:10px 14px;border-radius:10px;font-size:13.5px;line-height:1.78}
.msg.user .bub{background:rgba(79,142,247,.16);border:1px solid rgba(79,142,247,.24);border-bottom-right-radius:3px}
.msg.ai   .bub{background:var(--s2);border:1px solid var(--bd);border-bottom-left-radius:3px}
.bub strong{color:var(--blue)}
.bub em{color:var(--green);font-style:normal}
.bub .hi{color:var(--yellow)}
.bub .err{color:var(--pink)}
.bub code{display:inline;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:11px;background:rgba(79,142,247,.1);color:var(--blue);border:1px solid rgba(79,142,247,.2)}

/* skill chip */
.skill-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(155,124,248,.1);border:1px solid rgba(155,124,248,.25);font-size:10px;color:var(--purple);font-family:var(--mono);margin-bottom:7px;letter-spacing:.5px}

/* math block */
.math-block{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-top:8px;font-family:var(--mono);font-size:13px;color:#88d4f0;line-height:1.8}
.math-step{color:var(--dim2);font-size:11px;margin-top:2px}
.math-ans{color:var(--green);font-weight:700;font-size:15px;margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)}

/* shiritori */
.siri-status{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s3);border:1px solid var(--bd);border-radius:7px;margin-top:8px;font-size:12px}
.siri-badge{padding:2px 9px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:700}
.siri-badge.p{background:rgba(79,142,247,.15);color:var(--blue);border:1px solid rgba(79,142,247,.3)}
.siri-badge.a{background:rgba(30,217,138,.15);color:var(--green);border:1px solid rgba(30,217,138,.3)}
.siri-chain{flex:1;color:var(--dim2);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.siri-count{font-family:var(--mono);font-size:10px;color:var(--yellow)}

/* quick replies */
.qrs{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.qr{padding:5px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--s3);color:var(--dim2);font-size:12px;cursor:pointer;transition:all .2s}
.qr:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,142,247,.07)}

/* code block */
.code-wrap{margin-top:10px;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.code-head{display:flex;align-items:center;justify-content:space-between;padding:6px 11px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--bd)}
.code-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.code-lbl.html{color:#f97316}.code-lbl.javascript{color:#fbbf24}.code-lbl.typescript{color:#60a5fa}
.code-lbl.python{color:#4ade80}.code-lbl.rust{color:#fb923c}.code-lbl.c{color:#94a3b8}
.code-lbl.cpp{color:#38bdf8}.code-lbl.csharp{color:#c084fc}.code-lbl.java{color:#fcd34d}
.code-btns{display:flex;gap:5px}
.cbtn{padding:2px 9px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--dim2);font-size:10px;cursor:pointer;font-family:var(--sans);transition:all .2s}
.cbtn:hover{border-color:var(--blue);color:var(--blue)}
.cbtn.pv:hover{border-color:var(--green);color:var(--green)}
.cbtn.dl:hover{border-color:var(--yellow);color:var(--yellow)}
.code-ta{display:block;width:100%;background:#050810;color:#6b9ac4;font-family:var(--mono);font-size:11.5px;line-height:1.62;padding:12px;border:none;outline:none;resize:none;max-height:280px;overflow-y:auto;overflow-x:auto;white-space:pre;cursor:text;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}

/* fb */
.fb-row{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:8px;border-top:1px solid var(--bd)}
.fb-l{font-size:11px;color:var(--dim)}
.fb-btn{padding:2px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;font-size:12px;cursor:pointer;transition:all .2s}
.fb-btn.g:hover{background:rgba(30,217,138,.1);border-color:var(--green)}
.fb-btn.b:hover{background:rgba(247,78,125,.1);border-color:var(--pink)}

/* dots */
.dots{display:flex;gap:4px;padding:11px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;border-bottom-left-radius:3px;width:fit-content}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:dt 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes dt{0%,80%,100%{opacity:.15;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* ── WELCOME ── */
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:28px;text-align:center}
.w-icon{font-family:var(--mono);font-size:48px;background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:wg 3s ease-in-out infinite}
@keyframes wg{0%,100%{filter:drop-shadow(0 0 12px rgba(79,142,247,.4))}50%{filter:drop-shadow(0 0 28px rgba(30,217,138,.7))}}
.w-title{font-family:var(--mono);font-size:17px;letter-spacing:4px}
.w-sub{font-size:13px;color:var(--dim2);max-width:400px;line-height:1.85}
.w-skills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:480px}
.w-skill{padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--s2);font-size:11px;color:var(--dim2)}
.w-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:520px}
.w-chip{padding:6px 13px;border-radius:20px;border:1px solid var(--bd);background:var(--s2);color:var(--dim2);font-size:12px;cursor:pointer;transition:all .2s}
.w-chip:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,142,247,.07)}

/* ── INPUT ── */
#inp-area{padding:12px 16px;border-top:1px solid var(--bd);background:rgba(11,13,24,.98);flex-shrink:0}
#inp-box{display:flex;gap:9px;align-items:flex-end;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 12px;transition:border .2s}
#inp-box:focus-within{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,142,247,.07)}
#inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;resize:none;max-height:120px;line-height:1.6}
#inp::placeholder{color:var(--dim)}
#send{width:35px;height:35px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--blue),#1a3fbf);color:#fff;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
#send:hover{filter:brightness(1.15);transform:scale(1.07)}
#send:active{transform:scale(.94)}
#send:disabled{opacity:.3;cursor:not-allowed;transform:none;filter:none}

/* ── MODALS ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.83);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center}
.ov.on{display:flex}
@keyframes mi{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.mi{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;animation:mi .2s ease}
.mh{display:flex;align-items:center;justify-content:space-between;padding:9px 15px;border-bottom:1px solid var(--bd)}
.mt{font-family:var(--mono);font-size:12px;color:var(--green)}
.mc{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;transition:color .2s;line-height:1}
.mc:hover{color:var(--pink)}
#pv-modal .mi{width:93vw;height:87vh;display:flex;flex-direction:column}
#pv-frame{flex:1;border:none;background:#fff}

/* skill manager modal */
#sk-modal .mi{width:560px;max-width:95vw;max-height:88vh;display:flex;flex-direction:column}
.sk-modal-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.sk-modal-card{padding:12px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--s2)}
.sk-modal-card.enabled{border-color:rgba(79,142,247,.3)}
.skm-head{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.skm-icon{font-size:20px}
.skm-name{font-size:14px;font-weight:600;flex:1}
.skm-toggle{width:36px;height:20px;border-radius:99px;border:none;cursor:pointer;background:var(--bd2);position:relative;transition:background .2s;flex-shrink:0}
.skm-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.skm-toggle.on{background:var(--blue)}
.skm-toggle.on::after{transform:translateX(16px)}
.skm-desc{font-size:12px;color:var(--dim2);line-height:1.6;margin-bottom:6px}
.skm-tags{display:flex;flex-wrap:wrap;gap:4px}
.skm-tag{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(155,124,248,.1);color:var(--purple);border:1px solid rgba(155,124,248,.2)}
.skm-del-btn{padding:4px 11px;border-radius:5px;border:1px solid rgba(247,78,125,.3);background:transparent;color:var(--pink);font-size:11px;cursor:pointer;transition:all .2s;margin-left:auto}
.skm-del-btn:hover{background:rgba(247,78,125,.1)}
.gh-section{padding:12px 14px;border-radius:8px;border:1px dashed var(--bd2);background:var(--s3);margin-top:4px}
.gh-section h4{font-size:12px;color:var(--dim2);margin-bottom:10px;font-family:var(--mono);letter-spacing:.5px}
.gh-inp{width:100%;padding:8px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;transition:border .2s;margin-bottom:7px}
.gh-inp:focus{border-color:var(--green)}
.gh-imp-btn{width:100%;padding:8px;border-radius:7px;border:none;background:var(--green);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s}
.gh-imp-btn:hover{filter:brightness(1.1)}
#gh-status{font-size:11px;margin-top:6px;min-height:16px;font-family:var(--mono);color:var(--dim2)}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <span class="logo">カイ AI</span>
  <span class="ver">v6.0</span>
  <span class="pulse"></span>
  <span id="mode-chip">IDLE</span>
  <div class="hbtns">
    <button class="hbtn" onclick="toggleSb()">サイドバー</button>
    <button class="hbtn skill-btn" onclick="openSKModal()">⚡ スキル管理</button>
    <button class="hbtn" onclick="resetSess()">↺ リセット</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="sidebar">
    <div class="stabs">
      <button class="stab on"  onclick="showTab('skills',this)">スキル</button>
      <button class="stab"     onclick="showTab('mem',this)">メモリ</button>
      <button class="stab"     onclick="showTab('api',this)">API</button>
    </div>
    <div class="spanel on" id="sp-skills"></div>
    <div class="spanel"    id="sp-mem"></div>
    <div class="spanel"    id="sp-api"></div>
  </div>

  <div id="chat-wrap">
    <div id="chat">
      <div id="welcome">
        <div class="w-icon">⬡</div>
        <div class="w-title">KAI AI v6</div>
        <div class="w-sub">スキルで能力を拡張できるAI。しりとり・数学・古典・現代文・コード生成・雑談 — 全部できます。</div>
        <div class="w-skills" id="w-skills"></div>
        <div class="w-chips" id="w-chips"></div>
      </div>
    </div>
    <div id="inp-area">
      <div id="inp-box">
        <textarea id="inp" rows="1" placeholder="何でも話しかけてください...（しりとり / 数学の問題 / 古典の解説 / コード生成）"></textarea>
        <button id="send" onclick="doSend()">▶</button>
      </div>
    </div>
  </div>
</div>

<!-- PREVIEW MODAL -->
<div class="ov" id="pv-modal">
  <div class="mi"><div class="mh"><span class="mt">▶ PREVIEW</span><button class="mc" onclick="closePV()">✕</button></div><iframe id="pv-frame"></iframe></div>
</div>

<!-- SKILL MANAGER MODAL -->
<div class="ov" id="sk-modal">
  <div class="mi">
    <div class="mh"><span class="mt">⚡ スキル管理</span><button class="mc" onclick="closeSKModal()">✕</button></div>
    <div class="sk-modal-body" id="sk-modal-body"></div>
  </div>
</div>

<script>
'use strict';
const VER = '6.0';
const MEM_KEY = 'kai_v6';
const CS = new Map(); // code store

// ══════════════════════════════════════════════════
// SKILL REGISTRY
// ══════════════════════════════════════════════════
const SKILL_REGISTRY = new Map();

function registerSkill(skill) {
  SKILL_REGISTRY.set(skill.id, { ...skill, enabled: skill.enabled !== false });
  renderSkillSidebar();
  updateWelcomeSkills();
}
function toggleSkill(id) {
  const s = SKILL_REGISTRY.get(id);
  if (s) { s.enabled = !s.enabled; renderSkillSidebar(); renderSKModal(); }
}
function removeSkill(id) {
  if (['shiritori','math','koten','gendaibun','code','chat'].includes(id)) {
    addAI('⚠ デフォルトスキルは削除できません。', []);
    return;
  }
  SKILL_REGISTRY.delete(id);
  renderSkillSidebar(); renderSKModal();
}
function getEnabledSkills() {
  return [...SKILL_REGISTRY.values()].filter(s => s.enabled);
}
function routeToSkill(input) {
  const skills = getEnabledSkills();
  const scores = skills.map(s => {
    let score = 0;
    if (s.triggers) {
      for (const re of s.triggers) {
        if (re.test(input)) score += 10;
      }
    }
    return { skill: s, score };
  });
  scores.sort((a,b) => b.score - a.score);
  return scores[0]?.score > 0 ? scores[0].skill : null;
}

const Siri = {

  used: new Set(),

  consecutive: 0,
  // Large word dictionary
  words: [

    'だちょう','うさぎ','ぎたー','たぬき','きつね','ねこ','こあら','らいおん',

    'るびー','びーる','るびん','んき','きりん','りす','すずめ','めろん',
    'んごう','うなぎ','ぎゅうにゅう','うきわ','わし','しか','かえる','るすばん',
    'んちき','きのこ','こまつな','なす','すもも','もも','もぐら','らくがき',
    'きゅうり','りぼん','んてい','ていね','ねぎ','ぎんなん','んびき','びわ',

    'んこん','こんぶ','ぶどう','うさぎ2','ぎょうざ','ざる','るーれっと',
    'とまと','とけい','いぬ','ぬいぐるみ','みそ','そば','ばなな','なまず',
    'ずわいがに','にんじん','じてんしゃ','やぎ','ぎんこう','うぐいす','すっぽん',
    'んちゃ','ちゃわん','んばす','ばす','すけーと','とびうお','おやつ',
    'つばめ','めーぷる','るーれ','れもん','んそう','そうこ','こくばん',
    'んぼ','ぼうし','しんぶん','んみつ','みつばち','ちょうちょ','ちょうど',
    'どらごん','んちき2','きばん','んいん','いんこ','こうえん','えんぴつ',
    'つくえ','えほん','んちめ','めだい','いわし','しろくま','まつり',
    'りんご2','ごきぶり','りどみ','みどり','りとる','るかす','すぱい',
    'いちご','ごんぎつね','ねこじゃらし','しちめんちょう','うわぎ','ぎたー2',
    'たいよう','うみ','みんな','なまえ','えいご','ごめん','んびん','びんかん',
  ],
  getNgWords() { return new Set(['しりとり','んで始まる言葉']); },
  getAIWord(lastKana) {
    const cands = this.words.filter(w => {
      const first = w[0];
      return first === lastKana && !this.used.has(w) && w[w.length-1] !== 'ん';
    });
    if (!cands.length) return null;
    return cands[Math.floor(Math.random() * cands.length)];
  },
  getLastKana(word) {
    // Get last kana, normalize small kana
    let last = word[word.length - 1];
    const norm = {'ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','っ':'つ','ゃ':'や','ゅ':'ゆ','ょ':'よ','ー':null};
    if (last in norm) {
      if (norm[last] === null) last = word[word.length - 2] || last;
      else last = norm[last];
    }
    return last;
  },
  start() {
    this.active = true;
    this.chain = ['しりとり'];
    this.used = new Set(['しりとり']);
    this.lastKana = 'り';
    this.consecutive = 0;
    SESSION.mode = 'shiritori';
    setChip('SHIRITORI', 'skill');
  },
  end() {
    this.active = false;
    this.chain = [];
    this.used = new Set();
    this.lastKana = '';
    this.consecutive = 0;
    SESSION.mode = 'idle';
    setChip('IDLE', '');
  },
  play(input) {
    const word = input.trim().replace(/[！!？?。、]/g,'');
    const firstKana = word[0];
    // Check starts with correct kana
    if (this.lastKana && firstKana !== this.lastKana) {
      return { ok:false, msg:`❌ 「**${this.lastKana}**」から始まる言葉を入力してください。\n（入力: 「${word}」）` };
    }
    // Check ends with ん
    const lastKana = this.getLastKana(word);
    if (lastKana === 'ん') {
      this.end();
      return { ok:false, msg:`💀 「ん」で終わる言葉！**あなたの負け**です😄\n（チェーン: ${this.chain.length}個）\n\nもう一度しりとりをしますか？` };
    }
    // Check already used
    if (this.used.has(word)) {
      return { ok:false, msg:`⚠ 「${word}」はもう使われました！別の言葉を選んでください。` };
    }
    // Valid move
    this.chain.push(word);
    this.used.add(word);
    this.lastKana = lastKana;
    this.consecutive++;
    // AI responds
    const aiWord = this.getAIWord(lastKana);
    if (!aiWord) {
      const cnt = this.chain.length;
      this.end();
      return { ok:true, aiLost:true, msg:`🤔 「**${lastKana}**」から始まる言葉が思いつかない...カイの**負け**です！\n**${cnt}個**繋げました！すごい！` };
    }
    this.chain.push(aiWord);
    this.used.add(aiWord);
    this.lastKana = this.getLastKana(aiWord);
    const chainStr = this.chain.slice(-6).join(' → ');
    return {
      ok:true,
      word: aiWord,
      nextKana: this.getLastKana(aiWord),
      chainStr,
      count: this.chain.length,
      msg: `「**${aiWord}**」\n\n次は **「${this.getLastKana(aiWord)}」** から！`
    };
  }
};

// SKILL: MATH ENGINE (高校数学)
// ══════════════════════════════════════════════════
const Math_ = {
  // Safe evaluator
  safeEval(expr) {
    expr = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/²/g,'**2').replace(/³/g,'**3')
              .replace(/\^/g,'**').replace(/π/g,'Math.PI').replace(/e(?![a-z])/g,'Math.E');
    try {
      const fn = new Function('Math','sin','cos','tan','sqrt','log','abs','floor','ceil','round','PI','E',
        `"use strict"; return (${expr})`,
        Math, Math.sin, Math.cos, Math.tan, Math.sqrt, Math.log, Math.abs,
        Math.floor, Math.ceil, Math.round, Math.PI, Math.E);
      const r = fn();
      return typeof r === 'number' ? r : null;
    } catch { return null; }
  },

  // Detect problem type
  detectType(s) {
    if (/二次方程式|x\^2|x²|ax²|二次/.test(s)) return 'quadratic';
    if (/一次方程式|方程式.*x|x.*=.*\d|\d.*=.*x/.test(s)) return 'linear';
    if (/sin|cos|tan|三角/.test(s)) return 'trig';
    if (/log|対数/.test(s)) return 'log';
    if (/微分|d\/dx|導関数/.test(s)) return 'diff';
    if (/積分|∫/.test(s)) return 'integ';
    if (/平均|分散|標準偏差/.test(s)) return 'stats';
    if (/順列|組み合わせ|nCr|nPr|[Pp]erm|[Cc]omb/.test(s)) return 'comb';
    if (/確率/.test(s)) return 'prob';
    if (/ベクトル|vector/.test(s)) return 'vector';
    if (/行列|matrix/.test(s)) return 'matrix';
    if (/因数分解|factor/.test(s)) return 'factor';
    if (/[0-9].*[+\-*\/].*[0-9]|[+\-*\/]/.test(s)) return 'calc';
    return 'explain';
  },

  solve(input) {
    const type = this.detectType(input);
    switch(type) {
      case 'quadratic': return this.solveQuadratic(input);
      case 'linear':    return this.solveLinear(input);
      case 'trig':      return this.solveTrig(input);
      case 'log':       return this.solveLog(input);
      case 'diff':      return this.solveDiff(input);
      case 'integ':     return this.solveInteg(input);
      case 'stats':     return this.solveStats(input);
      case 'comb':      return this.solveComb(input);
      case 'factor':    return this.solveFactor(input);
      case 'calc':      return this.solveCalc(input);
      default:          return this.explainConcept(input);
    }
  },

  solveCalc(input) {
    const expr = input.replace(/[^0-9+\-*\/().π²³^×÷eE]/g,' ').trim();
    const nums = input.match(/-?\d+\.?\d*/g);
    // Clean expression
    const clean = input.replace(/[^0-9+\-*\/().^π²³×÷]/g,'').trim() || (nums ? nums.join('') : '');
    const r = this.safeEval(expr.replace(/\s+/g,'') || expr);
    if (r === null) return { type:'calc', error:true, msg:'計算式を認識できませんでした。例: `2+3*4`、`sin(π/6)`' };
    const disp = Number.isInteger(r) ? r : parseFloat(r.toFixed(8));
    return { type:'calc', expr, result:disp, steps:[`式: ${input.trim()}`,`= ${disp}`] };
  },

  solveQuadratic(input) {
    // Extract ax²+bx+c=0
    const m = input.match(/(-?\d*\.?\d*)x\^?2\s*([+\-]\s*\d*\.?\d*)x\s*([+\-]\s*\d+\.?\d*)\s*=\s*0/);
    let a=1,b=0,c=0;
    if (m) {
      a = parseFloat(m[1]||'1')||1;
      b = parseFloat(m[2].replace(/\s/g,''))||0;
      c = parseFloat(m[3].replace(/\s/g,''))||0;
    } else {
      // Try to extract numbers
      const nums = input.match(/-?\d+\.?\d*/g);
      if (nums && nums.length >= 2) { a=parseFloat(nums[0]); b=parseFloat(nums[1])||0; c=parseFloat(nums[2])||0; }
    }
    const D = b*b - 4*a*c;
    const steps = [
      `方程式: ${a}x² + ${b}x + ${c} = 0`,
      `判別式 D = b² - 4ac = ${b}² - 4×${a}×${c} = ${D}`,
    ];
    let result = '';
    if (D > 0) {
      const x1 = (-b + Math.sqrt(D))/(2*a), x2 = (-b - Math.sqrt(D))/(2*a);
      steps.push(`D > 0 → 異なる2つの実数解`);
      result = `x = ${parseFloat(x1.toFixed(6))}, ${parseFloat(x2.toFixed(6))}`;
    } else if (D === 0) {
      const x = -b/(2*a);
      steps.push(`D = 0 → 重解`);
      result = `x = ${parseFloat(x.toFixed(6))} (重解)`;
    } else {
      const re = -b/(2*a), im = Math.sqrt(-D)/(2*a);
      steps.push(`D < 0 → 虚数解`);
      result = `x = ${parseFloat(re.toFixed(4))} ± ${parseFloat(im.toFixed(4))}i`;
    }
    return { type:'quadratic', steps, result };
  },

  solveLinear(input) {
    // ax + b = c  →  ax = c - b  →  x = (c-b)/a
    const expr = input.replace(/\s/g,'');
    const m = expr.match(/(-?\d*\.?\d*)x([+\-]\d+\.?\d*)?=(-?\d+\.?\d*)/);
    if (!m) {
      // Try: ax = b
      const m2 = expr.match(/(-?\d*)x=(-?\d+\.?\d*)/);
      if (m2) {
        const a2 = parseFloat(m2[1]||'1')||1, b2 = parseFloat(m2[2]);
        const x = b2/a2;
        return { type:'linear', steps:[`${a2}x = ${b2}`, `x = ${b2} ÷ ${a2}`], result:`x = ${parseFloat(x.toFixed(6))}` };
      }
      return { type:'linear', error:true, msg:'一次方程式を認識できませんでした。例: `2x + 3 = 7`' };
    }
    const a = parseFloat(m[1]||'1')||1, b2 = parseFloat(m[2]||'0')||0, c = parseFloat(m[3]);
    const x = (c - b2) / a;
    return {
      type: 'linear',
      steps: [
        `${a}x + ${b2} = ${c}`,
        `${a}x = ${c} - ${b2} = ${c - b2}`,
        `x = ${c - b2} ÷ ${a}`,
      ],
      result: `x = ${parseFloat(x.toFixed(6))}`
    };
  },

  solveTrig(input) {
    const i = input.toLowerCase();
    const numMatch = i.match(/\d+\.?\d*/);
    const deg = numMatch ? parseFloat(numMatch[0]) : null;
    const rad = deg !== null ? deg * Math.PI / 180 : null;
    const results = [];
    if (deg !== null) {
      results.push(`角度: ${deg}°= ${deg}π/180 rad`);
      if (/sin/.test(i)) results.push(`sin(${deg}°) = ${parseFloat(Math.sin(rad).toFixed(6))}`);
      if (/cos/.test(i)) results.push(`cos(${deg}°) = ${parseFloat(Math.cos(rad).toFixed(6))}`);
      if (/tan/.test(i)) results.push(`tan(${deg}°) = ${parseFloat(Math.tan(rad).toFixed(6))}`);
    }
    const table = `\n📋 **三角比の主要値:**\n| 角度 | sin | cos | tan |\n|0°|0|1|0|\n|30°|1/2|√3/2|1/√3|\n|45°|√2/2|√2/2|1|\n|60°|√3/2|1/2|√3|\n|90°|1|0|−|`;
    return {
      type:'trig',
      steps: results.length ? results : ['三角関数の値を計算します'],
      result: results.length ? results[results.length-1] : '',
      extra: table
    };
  },

  solveLog(input) {
    const i = input.toLowerCase();
    const mLog = i.match(/log(\d+\.?\d*)\s*[\(（]?\s*(\d+\.?\d*)/);
    if (mLog) {
      const base = parseFloat(mLog[1]), val = parseFloat(mLog[2]);
      const r = Math.log(val)/Math.log(base);
      return {
        type:'log',
        steps:[`log_${base}(${val})`, `= ln(${val}) / ln(${base})`, `= ${parseFloat(Math.log(val).toFixed(6))} / ${parseFloat(Math.log(base).toFixed(6))}`],
        result:`= ${parseFloat(r.toFixed(6))}`
      };
    }
    // ln
    const mLn = i.match(/ln\s*[\(（]?\s*(\d+\.?\d*)/);
    if (mLn) {
      const v = parseFloat(mLn[1]);
      return { type:'log', steps:[`ln(${v})`], result:`= ${parseFloat(Math.log(v).toFixed(6))}` };
    }
    return { type:'log', steps:[], result:'', extra:'**対数の公式:**\n・log_a(MN) = log_a(M) + log_a(N)\n・log_a(M/N) = log_a(M) - log_a(N)\n・log_a(Mⁿ) = n·log_a(M)\n・log_a(a) = 1, log_a(1) = 0' };
  },

  solveDiff(input) {
    const i = input.toLowerCase();
    // Basic patterns
    const patterns = [
      [/x\^(\d+)|x(\d+)/,    (m) => { const n=parseInt(m[1]||m[2]); return `d/dx [x^${n}] = ${n}x^${n-1}`; }],
      [/(\d+)x\^(\d+)/,      (m) => { const c=parseInt(m[1]),n=parseInt(m[2]); return `d/dx [${c}x^${n}] = ${c*n}x^${n-1}`; }],
      [/sin\(x\)/,            () => 'd/dx [sin(x)] = cos(x)'],
      [/cos\(x\)/,            () => 'd/dx [cos(x)] = -sin(x)'],
      [/e\^x|exp\(x\)/,       () => 'd/dx [eˣ] = eˣ'],
      [/ln\(x\)|log\(x\)/,    () => 'd/dx [ln(x)] = 1/x'],
      [/x\^2/,                () => 'd/dx [x²] = 2x'],
      [/x\^3/,                () => 'd/dx [x³] = 3x²'],
    ];
    for (const [re,fn] of patterns) {
      const m = i.match(re);
      if (m) {
        const result = fn(m);
        return { type:'diff', steps:['微分の計算:', input.trim()], result };
      }
    }
    return {
      type:'diff', steps:[], result:'',
      extra:'**微分の基本公式:**\n・(xⁿ)\' = nxⁿ⁻¹\n・(sin x)\' = cos x\n・(cos x)\' = -sin x\n・(eˣ)\' = eˣ\n・(ln x)\' = 1/x\n・(uv)\' = u\'v + uv\' （積の微分）'
    };
  },

  solveInteg(input) {
    const i = input.toLowerCase();
    const patterns = [
      [/x\^(\d+)/,     (m) => { const n=parseInt(m[1]); return `∫x^${n} dx = x^${n+1}/${n+1} + C`; }],
      [/sin\(x\)/,     () => '∫sin(x) dx = -cos(x) + C'],
      [/cos\(x\)/,     () => '∫cos(x) dx = sin(x) + C'],
      [/e\^x|exp\(x\)/,() => '∫eˣ dx = eˣ + C'],
      [/1\/x|x\^-1/,   () => '∫(1/x) dx = ln|x| + C'],
    ];
    for (const [re,fn] of patterns) {
      const m = i.match(re);
      if (m) return { type:'integ', steps:['積分の計算:',input.trim()], result:fn(m) };
    }
    return {
      type:'integ', steps:[], result:'',
      extra:'**積分の基本公式:**\n・∫xⁿ dx = xⁿ⁺¹/(n+1) + C\n・∫sin x dx = -cos x + C\n・∫cos x dx = sin x + C\n・∫eˣ dx = eˣ + C\n・∫(1/x) dx = ln|x| + C'
    };
  },

  solveStats(input) {
    const nums = input.match(/-?\d+\.?\d*/g);
    if (!nums || nums.length < 2) return { type:'stats', error:true, msg:'数値を入力してください。例: `1,2,3,4,5 の平均`' };
    const data = nums.map(Number);
    const n = data.length;
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const variance = data.reduce((a,b)=>a+(b-mean)**2,0)/n;
    const sd = Math.sqrt(variance);
    const sorted = [...data].sort((a,b)=>a-b);
    const median = n%2===0 ? (sorted[n/2-1]+sorted[n/2])/2 : sorted[Math.floor(n/2)];
    return {
      type:'stats',
      steps:[`データ: ${data.join(', ')}`, `n = ${n}`],
      result:`平均(μ): ${parseFloat(mean.toFixed(4))}\n分散(σ²): ${parseFloat(variance.toFixed(4))}\n標準偏差(σ): ${parseFloat(sd.toFixed(4))}\n中央値: ${median}\n最大値: ${Math.max(...data)}, 最小値: ${Math.min(...data)}`
    };
  },

  solveComb(input) {
    const nums = input.match(/\d+/g);
    if (!nums || nums.length < 2) return { type:'comb', error:true, msg:'例: `5C3`, `7P2`, `5つから3つ選ぶ組み合わせ`' };
    const n = parseInt(nums[0]), r = parseInt(nums[1]);
    const fact = (x) => x<=1 ? 1 : x*fact(x-1);
    const isC = /c|組み合わせ|comb/i.test(input);
    const isP = /p|順列|perm/i.test(input);
    const C = fact(n)/(fact(r)*fact(n-r));
    const P = fact(n)/fact(n-r);
    const steps = [`n=${n}, r=${r}`, `n! = ${fact(n)}`, `r! = ${fact(r)}`, `(n-r)! = ${fact(n-r)}`];
    if (isC) return { type:'comb', steps:[...steps,`nCr = n!/(r!(n-r)!)`], result:`${n}C${r} = ${C}` };
    if (isP) return { type:'comb', steps:[...steps,`nPr = n!/(n-r)!`], result:`${n}P${r} = ${P}` };
    return { type:'comb', steps, result:`${n}C${r} = ${C}\n${n}P${r} = ${P}` };
  },

  solveFactor(input) {
    const m = input.match(/(-?\d*)x\^?2\s*([+\-]\s*\d*)x\s*([+\-]\s*\d+)/);
    if (!m) return { type:'factor', error:true, msg:'例: `x²+5x+6 を因数分解`' };
    const a = parseInt(m[1]||'1')||1;
    const b = parseInt(m[2].replace(/\s/g,'')||'0')||0;
    const c = parseInt(m[3].replace(/\s/g,'')||'0')||0;
    // Find p,q such that p+q=b, p*q=a*c
    let found = null;
    for (let p=-50;p<=50;p++) {
      for (let q=-50;q<=50;q++) {
        if (p+q===b && p*q===a*c) { found=[p,q]; break; }
      }
      if (found) break;
    }
    if (!found) {
      const D=b*b-4*a*c;
      if (D<0) return { type:'factor', steps:[`${a}x²+${b}x+${c}`], result:'実数の範囲では因数分解できません（判別式 D<0）' };
      return { type:'factor', steps:[`${a}x²+${b}x+${c}`], result:'因数分解の整数解が見つかりませんでした。二次方程式として解きますか？' };
    }
    const [p,q] = found;
    return {
      type:'factor',
      steps:[`${a}x²+${b}x+${c}`,`p+q=${b}, p×q=${a*c}を満たすp,q → p=${p}, q=${q}`],
      result:`= (${a===1?'':''+a}x + ${p/a===Math.floor(p/a)?p/a:p})(x + ${q/a===Math.floor(q/a)?q/a:q})` // simplified
    };
  },

  explainConcept(input) {
    const i = input.toLowerCase();
    const concepts = {
      '三平方|ピタゴラス': '**三平方の定理 (ピタゴラスの定理)**\n\na² + b² = c²\n\n直角三角形において、斜辺cの二乗は他の二辺の二乗の和に等しい。\n\n例: a=3, b=4 → c² = 9+16 = 25 → c=5（3-4-5の三角形）',
      '等差数列': '**等差数列**\n\n一般項: aₙ = a₁ + (n-1)d\n和: Sₙ = n(a₁+aₙ)/2 = n{2a₁+(n-1)d}/2\n\nd: 公差, a₁: 初項',
      '等比数列': '**等比数列**\n\n一般項: aₙ = a₁·rⁿ⁻¹\n和: Sₙ = a₁(rⁿ-1)/(r-1) (r≠1)\n\nr: 公比, a₁: 初項',

  pyscript:[[30,/pyscript/i]],
  javascript:[[15,/\bjs\b|javascript|バニラ/i]],
};
function inferLang(s) {
  const scores = {};
  for (const [lang,sigs] of Object.entries(LS)) { scores[lang]=0; for (const [w,re] of sigs) if(re.test(s)) scores[lang]+=w; }
  if (Math.max(...Object.values(scores))<8) scores.html+=8;
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

// GITHUB SKILL IMPORT
// ══════════════════════════════════════════════════
async function importFromGitHub(url) {
  setGHStatus('読み込み中...', 'var(--yellow)');
  try {
    // Convert GitHub URL to raw URL
    let rawUrl = url.trim();
    rawUrl = rawUrl
      .replace('https://github.com/', 'https://raw.githubusercontent.com/')
      .replace('/blob/', '/');
    if (!rawUrl.includes('raw.githubusercontent.com') && !rawUrl.startsWith('https://')) {
      throw new Error('有効なGitHub URLを入力してください');
    }
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error(`取得失敗: ${res.status}`);
    const text = await res.text();
    // Try to parse as skill definition
    const skill = parseSkillFromCode(text, url);
    if (!skill) throw new Error('スキル定義が見つかりません。フォーマットを確認してください。');
    registerSkill(skill);
    setGHStatus(`✅ 「${skill.name}」を登録しました！`, 'var(--green)');
    renderSKModal();
    return skill;
  } catch(e) {
    setGHStatus(`❌ ${e.message}`, 'var(--pink)');
    return null;
  }
}

function setGHStatus(msg, color) {
  const el = document.getElementById('gh-status');
  if (el) { el.textContent = msg; el.style.color = color; }
}

function parseSkillFromCode(code, sourceUrl) {
  // Try JSON format
  if (code.trim().startsWith('{') || code.trim().startsWith('[')) {
    try {
      const obj = JSON.parse(code.trim().startsWith('[') ? `{"skills":${code}}` : code);
      const s = obj.skill || obj;
      if (s.id && s.name) {
        return buildSkillFromObj(s, sourceUrl);
      }
    } catch {}
  }
  // Try to extract skill object from JS
  const match = code.match(/const\s+\w+\s*=\s*\{[\s\S]*?\}/);
  if (match) {
    try {
      const fn = new Function(`return ${match[0].replace(/^const\s+\w+\s*=\s*/,'')}`);
      const obj = fn();
      if (obj && obj.id && obj.name) return buildSkillFromObj(obj, sourceUrl);
    } catch {}
  }
  // Heuristic: extract name/description/keywords from any file
  const nameMatch = code.match(/name['":\s]+(['"]?)([^\s'",:]+)\1/i);
  const idMatch   = code.match(/id['":\s]+(['"]?)([a-zA-Z0-9_\-]+)\1/i);
  if (nameMatch) {
    return {
      id: idMatch ? idMatch[2] : 'gh_' + Date.now(),
      name: nameMatch[2],
      icon: '🌐',
      description: `GitHubから読み込んだスキル (${sourceUrl.split('/').pop()})`,
      enabled: true,
      builtin: false,
      tags: ['GitHub'],
      source: sourceUrl,
      triggers: [new RegExp(nameMatch[2].toLowerCase(), 'i')],
      handler(input) {
        return { type:'text', text:`**${nameMatch[2]}** スキルが呼び出されました。\n\nソース: [GitHub](${sourceUrl})\n\nこのスキルのハンドラーをカスタマイズしてください。`, qr:[] };
      }
    };
  }
  return null;
}

function buildSkillFromObj(obj, sourceUrl) {
  const kw = (obj.keywords || obj.tags || [obj.name || '']).map(k => new RegExp(k.toLowerCase(),'i'));
  return {
    id:          obj.id || 'gh_' + Date.now(),
    name:        obj.name || 'GitHub Skill',
    icon:        obj.icon || '🌐',
    description: obj.description || `GitHubから読み込んだスキル`,
    enabled:     true,
    builtin:     false,
    tags:        obj.tags || [],
    source:      sourceUrl,
    triggers:    kw.length ? kw : [/.*/],
    handler(input) {
      const resp = obj.response || obj.answer || `${obj.name} スキルが応答しました。`;
      return { type:'text', text: typeof resp === 'function' ? resp(input) : resp, qr:[] };
    }
  };
}

function loadMem(){try{return JSON.parse(localStorage.getItem(MEM_KEY))||{learned:[],scores:{}}}catch{return{learned:[],scores:{}}}}
function saveMem(m){try{localStorage.setItem(MEM_KEY,JSON.stringify(m))}catch{}}

function delLearned(id){const m=loadMem();m.learned=m.learned.filter(x=>x.id!==id);saveMem(m);renderMem()}
function rateItem(id,good){const m=loadMem();if(!m.scores[id])m.scores[id]={g:0,b:0};good?m.scores[id].g++:m.scores[id].b++;saveMem(m)}
function memMatch(input){const low=input.toLowerCase();const m=loadMem();for(const p of m.learned){if((p.keywords||[]).some(k=>low.includes(k.toLowerCase())))return p;}return null}

async function doSend() {
  if (BUSY) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  const w = document.getElementById('welcome');
  if (w) w.remove();

  addUser(text);
  SESSION.turnCount++;
  BUSY = true;
  document.getElementById('send').disabled = true;
  setChip('THINKING', 'active');

  const dots = addDots();
  await sleep(250 + Math.random() * 300);

  try {
    // Shiritori ongoing check first
    if (Siri.active) {
      const r = handleShiritori(text);
      if (r) { removeDots(dots); await renderSkillResponse(r, 'shiritori'); return; }
    }

    // Memory match (for code)
    const mm = memMatch(text);
    if (mm) {
      removeDots(dots);
      addSkillChip('メモリ');
      CS.set('mm_'+Date.now(), mm.code);
      addCodeMsg(mm.name, mm.language, mm.code, 'mm_'+Date.now());
      return;
    }

    // Route to best skill
    const skill = routeToSkill(text);
    if (skill) {
      const result = skill.handler(text, SESSION);
      removeDots(dots);
      addSkillChip(skill.name);
      await renderSkillResponse(result, skill.id);
    } else {
      removeDots(dots);
      addAI('スキルが見つかりませんでした。「⚡ スキル管理」からスキルを確認してください。', []);
    }
  } catch(e) {
    removeDots(dots);
    addAI('⚠ エラー: ' + e.message, []);
  } finally {
    BUSY = false;
    document.getElementById('send').disabled = false;
    setChip('IDLE', '');
    document.getElementById('inp').focus();
  }
}

async function renderSkillResponse(res, skillId) {
  if (!res) return;
  if (res.type === 'text') {
    addAI(res.text || '', res.qr || []);
  }
  else if (res.type === 'shiritori_start') {
    addAI(res.text, res.qr || []);
  }
  else if (res.type === 'shiritori') {
    const r = res.result;
    if (!r.ok) {
      addAI(r.msg, r.msg.includes('もう一度') ? ['しりとりしよう'] : []);
      if (r.msg.includes('負け')) Siri.end();
    } else if (r.aiLost) {
      addAI(r.msg, ['もう一度しりとりしよう']);
    } else {
      const bub = addSiriBub(r.word, r.nextKana, r.count, Siri.chain.slice(-5).join(' → '));
      addAI(r.msg, []);
    }
  }
  else if (res.type === 'math') {
    renderMathResult(res.result);
  }
  else if (res.type === 'koten' || res.type === 'gendai') {
    addAI(res.result.result || '', []);
  }
  else if (res.type === 'code_async') {
    addAI(`**${LL[res.lang]||res.lang}** で「${res.topic}」を生成します...`, []);
    const dot2 = addDots();
    const refs = await ghSearch(res.topic, res.lang);
    if (refs.length) { addGH(refs); }
    removeDots(dot2);
    await sleep(300);
    const r = genCode(res.topic, res.lang, res.input);
    const id = 'c_' + Date.now();
    CS.set(id, r.code);
    // Auto-learn
    const m = loadMem();
    const kw = res.topic.split(/\s+/).slice(0,5).filter(Boolean);
    m.learned.unshift({id,keywords:kw,name:res.topic,language:r.lang,code:r.code,uses:1,added:new Date().toLocaleDateString('ja')});
    saveMem(m); renderMem();
    addCodeMsg(res.topic, r.lang, r.code, id);
  }
  else if (res.type === 'code') {
    const id = 'c_' + Date.now();
    CS.set(id, res.code);
    addCodeMsg(res.name||'コード', res.lang, res.code, id);
  }
}

async function ghSearch(q, lang) {
  try {
    const url=`https://api.github.com/search/repositories?q=${encodeURIComponent(q.slice(0,40))}+language:${GL[lang]||'html'}&sort=stars&order=desc&per_page=4`;
    const r=await fetch(url,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok)return[];
    const d=await r.json();
    return(d.items||[]).slice(0,3).map(x=>({name:x.full_name,desc:x.description||'説明なし',stars:x.stargazers_count,url:x.html_url}));
  }catch{return[]}
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>')
    .replace(/\|(.+)\|/g, (m) => {
      const cells = m.split('|').filter(Boolean);
      return '<table style="border-collapse:collapse;margin:6px 0;font-size:12px">' + cells.map((c,i) => `<td style="padding:3px 8px;border:1px solid var(--bd);${i===0?'font-weight:600;color:var(--blue)':''}">${c.trim()}</td>`).join('') + '</table>';
    });
}

window.addEventListener('message', async e => {
  if (!e.data || e.data.type !== 'KAI_REQUEST') return;
  const {action,payload,id} = e.data;
  try {
    const fn = window.KaiAI[action];
    if (typeof fn !== 'function') throw new Error('Unknown: '+action);
    const result = await fn(payload||{});
    e.source?.postMessage({type:'KAI_RESPONSE',id,result,ok:true},e.origin||'*');
  } catch(err) {
    e.source?.postMessage({type:'KAI_RESPONSE',id,error:err.message,ok:false},e.origin||'*');
  }
});

// ══════════════════════════════════════════════════
// WELCOME + INPUT EVENTS
// ══════════════════════════════════════════════════
function updateWelcomeSkills() {
  const el = document.getElementById('w-skills');
  if (!el) return;
  el.innerHTML = '';
  SKILL_REGISTRY.forEach(s => {
    if (!s.enabled) return;
    const sp = document.createElement('span');
    sp.className = 'w-skill';
    sp.textContent = s.icon + ' ' + s.name;
    el.append(sp);
  });
}

function resetSess() {
  SESSION.mode = 'idle'; SESSION.turnCount = 0;
  Siri.end();
  setChip('IDLE', '');
  addAI('↺ リセットしました！\n\n何でも話しかけてください。', ['しりとりしよう','数学の問題を出して','コードを作って','古典を教えて']);
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});
document.getElementById('inp').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
['pv-modal','sk-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('on');
      if (id === 'pv-modal') document.getElementById('pv-frame').srcdoc = '';
    }
  });
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
(function init() {
  const chips = ['しりとりしよう！','x²+5x+6=0 を解いて','源氏物語について教えて','ログインフォームを作って','小論文の書き方','5C3を計算して','こんにちは！','二次方程式を出して'];
  const el = document.getElementById('w-chips');
  chips.forEach(c => {
    const b = document.createElement('button'); b.className = 'w-chip'; b.textContent = c;
    b.onclick = () => { document.getElementById('inp').value = c; doSend(); };
    el.append(b);
  });
  updateWelcomeSkills();
  renderSkillSidebar();
  renderMem();
  renderAPIPanel();
  console.log(`%cカイ AI v${VER} 起動`, 'color:#4f8ef7;font-weight:700;font-size:14px');
  console.log('%cスキル一覧:', 'color:#1ed98a', [...SKILL_REGISTRY.keys()]);
})();
</script>
