<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>カイ AI v4</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

/* ===== VARIABLES ===== */
:root {
  --bg:     #07090f;
  --s1:     #0c0e18;
  --s2:     #111520;
  --s3:     #161b2a;
  --bd:     #1d2438;
  --bd2:    #26304a;
  --blue:   #3b82f6;
  --green:  #10b981;
  --pink:   #f43f5e;
  --yellow: #f59e0b;
  --text:   #cbd5e1;
  --dim:    #4b5a72;
  --dim2:   #6b7a96;
  --mono:   'JetBrains Mono', monospace;
  --sans:   'Noto Sans JP', sans-serif;
  --r:      8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--s1);
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
  z-index: 50;
}
.logo {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(90deg, var(--blue), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.ver {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  border: 1px solid var(--bd);
  padding: 2px 6px;
  border-radius: 20px;
  letter-spacing: 1px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
#mode-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 9px;
  border-radius: 20px;
  letter-spacing: 1px;
  border: 1px solid var(--bd);
  color: var(--dim2);
}
#mode-badge.gathering { color:var(--yellow); border-color:var(--yellow); }
#mode-badge.ready     { color:var(--green);  border-color:var(--green); }
.hbtns { display:flex; gap:6px; margin-left:auto; }
.hbtn {
  padding: 5px 11px;
  border: 1px solid var(--bd);
  border-radius: 6px;
  background: transparent;
  color: var(--dim2);
  font-size: 11px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .3px;
}
.hbtn:hover { border-color:var(--blue); color:var(--blue); }

/* ===== LAYOUT ===== */
#main { display:flex; flex:1; overflow:hidden; }

/* ===== SIDEBAR ===== */
#sidebar {
  width: 244px;
  flex-shrink: 0;
  border-right: 1px solid var(--bd);
  background: var(--s1);
  display: flex;
  flex-direction: column;
  transition: width .25s ease, opacity .25s;
  overflow: hidden;
}
#sidebar.closed { width:0; opacity:0; }
.stabs { display:flex; border-bottom:1px solid var(--bd); flex-shrink:0; }
.stab {
  flex:1; padding:8px 2px;
  border:none; background:none;
  font-size:10px; font-family:var(--sans);
  letter-spacing:.5px; text-transform:uppercase;
  color:var(--dim); cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s;
}
.stab:hover { color:var(--text); }
.stab.on { color:var(--blue); border-bottom-color:var(--blue); }
.spanel {
  display:none; flex:1; overflow-y:auto;
  padding:10px; flex-direction:column; gap:6px;
  scrollbar-width:thin; scrollbar-color:var(--bd) transparent;
}
.spanel.on { display:flex; }

/* sidebar cards */
.scard {
  padding:9px 11px; border-radius:7px;
  border:1px solid var(--bd); background:var(--s2);
  cursor:pointer; transition:all .2s;
}
.scard:hover { border-color:var(--blue); background:rgba(59,130,246,.06); }
.sc-name { font-size:12px; font-weight:500; margin-bottom:2px; }
.sc-lang { font-family:var(--mono); font-size:9px; color:var(--blue); letter-spacing:1px; }
.sc-kw   { font-size:10px; color:var(--dim); margin-top:2px; }
.sc-del  { float:right; background:none; border:none; color:var(--dim); cursor:pointer; font-size:13px; }
.sc-del:hover { color:var(--pink); }
.sc-score { font-size:10px; color:var(--yellow); margin-top:3px; }
.s-empty { color:var(--dim); font-size:11px; text-align:center; padding:20px 0; line-height:1.8; }

/* API docs */
.api-block {
  background:var(--bg); border:1px solid var(--bd);
  border-radius:6px; padding:10px;
  font-family:var(--mono); font-size:10px;
  color:#6fa3d8; line-height:1.6;
  white-space:pre; overflow-x:auto;
  margin-bottom:6px;
}
.api-ttl { font-size:10px; color:var(--dim2); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.api-note { font-size:11px; color:var(--dim); line-height:1.7; margin-bottom:10px; }
.copy-api {
  width:100%; padding:5px; border-radius:5px;
  border:1px solid var(--bd); background:transparent;
  color:var(--dim2); font-size:11px; cursor:pointer;
  font-family:var(--sans); transition:all .2s;
  margin-bottom:14px;
}
.copy-api:hover { border-color:var(--blue); color:var(--blue); }

/* ===== CHAT AREA ===== */
#chat-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* progress bar */
#progress {
  display:none; flex-shrink:0;
  padding:7px 18px;
  background:var(--s1); border-bottom:1px solid var(--bd);
}
#progress.on { display:block; }
.pg-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
.pg-lbl { font-family:var(--mono); font-size:10px; color:var(--yellow); flex-shrink:0; }
.pg-bar { flex:1; height:3px; background:var(--bd); border-radius:99px; overflow:hidden; }
.pg-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--green)); border-radius:99px; transition:width .4s ease; }
.pg-steps { display:flex; gap:5px; }
.pg-step { flex:1; height:3px; border-radius:99px; background:var(--bd); transition:background .3s; }
.pg-step.done   { background:var(--green); }
.pg-step.active { background:var(--yellow); box-shadow:0 0 5px var(--yellow); }

/* messages */
#chat {
  flex:1; overflow-y:auto; padding:18px;
  display:flex; flex-direction:column; gap:13px;
  scrollbar-width:thin; scrollbar-color:var(--bd) transparent;
}
#chat::-webkit-scrollbar { width:4px; }
#chat::-webkit-scrollbar-thumb { background:var(--bd); border-radius:2px; }
.msg { display:flex; gap:9px; opacity:0; animation:fadeup .25s ease forwards; }
@keyframes fadeup { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; align-self:flex-end; max-width:72%; }
.msg.ai   { align-self:flex-start; max-width:95%; }
.ava {
  width:27px; height:27px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:9px; font-weight:700;
  flex-shrink:0; letter-spacing:.5px;
}
.msg.user .ava { background:var(--blue); color:#000; }
.msg.ai   .ava { background:linear-gradient(135deg,#1d4ed8,#065f46); color:#fff; }
.bub {
  padding:10px 14px; border-radius:10px;
  font-size:13.5px; line-height:1.75;
}
.msg.user .bub {
  background:rgba(59,130,246,.18);
  border:1px solid rgba(59,130,246,.28);
  border-bottom-right-radius:3px;
}
.msg.ai .bub {
  background:var(--s2);
  border:1px solid var(--bd);
  border-bottom-left-radius:3px;
}

/* ===== CODE BLOCK ===== */
.code-wrap {
  margin-top:10px;
  border:1px solid var(--bd);
  border-radius:8px;
  overflow:hidden;
}
.code-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 11px;
  background:rgba(255,255,255,.03);
  border-bottom:1px solid var(--bd);
}
.code-lang {
  font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase;
}
.code-lang.html       { color:#f97316; }
.code-lang.css        { color:#a78bfa; }
.code-lang.javascript { color:#fbbf24; }
.code-lang.typescript { color:#60a5fa; }
.code-lang.python     { color:#4ade80; }
.code-lang.rust       { color:#fb923c; }
.code-lang.c          { color:#94a3b8; }
.code-lang.cpp        { color:#38bdf8; }
.code-lang.csharp     { color:#c084fc; }
.code-lang.java       { color:#fcd34d; }
.code-lang.pyscript   { color:#6ee7b7; }
.code-btns { display:flex; gap:5px; }
.cbtn {
  padding:2px 9px; border-radius:4px;
  border:1px solid var(--bd);
  background:transparent; color:var(--dim2);
  font-size:10px; cursor:pointer;
  font-family:var(--sans); transition:all .2s;
}
.cbtn:hover               { border-color:var(--blue);   color:var(--blue); }
.cbtn.preview:hover       { border-color:var(--green);  color:var(--green); }
.cbtn.download:hover      { border-color:var(--yellow); color:var(--yellow); }

/* *** KEY FIX: code textarea — CSS cannot bleed through *** */
.code-area {
  display:block; width:100%;
  background:#06080f;
  color:#7ea8c4;
  font-family:var(--mono);
  font-size:11.5px;
  line-height:1.62;
  padding:13px;
  border:none; outline:none; resize:none;
  max-height:300px;
  overflow-y:auto;
  white-space:pre;
  scrollbar-width:thin;
  scrollbar-color:var(--bd) transparent;
  /* prevent CSS from generated code ever touching parent */
  all: unset;
  display:block; width:100%;
  background:#06080f; color:#7ea8c4;
  font-family:var(--mono); font-size:11.5px; line-height:1.62;
  padding:13px; border:none; outline:none;
  max-height:300px; overflow-y:auto;
  white-space:pre; overflow-x:auto;
  cursor:text;
}

/* feedback */
.fb-row { display:flex; align-items:center; gap:7px; margin-top:9px; padding-top:8px; border-top:1px solid var(--bd); }
.fb-lbl { font-size:11px; color:var(--dim); }
.fbbtn {
  padding:2px 11px; border-radius:20px;
  border:1px solid var(--bd);
  background:transparent; font-size:12px; cursor:pointer; transition:all .2s;
}
.fbbtn.g:hover { background:rgba(16,185,129,.12); border-color:var(--green); }
.fbbtn.b:hover { background:rgba(244,63,94,.12);  border-color:var(--pink); }

/* GitHub refs */
.gh-refs { margin-top:8px; display:flex; flex-direction:column; gap:5px; }
.gh-ref {
  display:flex; align-items:center; gap:8px;
  padding:7px 11px; border-radius:7px;
  border:1px solid var(--bd); background:var(--s3);
  text-decoration:none; color:var(--text);
  cursor:pointer; transition:all .2s;
}
.gh-ref:hover { border-color:var(--green); }
.gh-info { flex:1; min-width:0; }
.gh-name { font-size:12px; font-weight:500; color:var(--green); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gh-desc { font-size:10px; color:var(--dim2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
.gh-stars { font-family:var(--mono); font-size:9px; color:var(--yellow); flex-shrink:0; }

/* thinking dots */
.dots { display:flex; gap:4px; padding:11px 14px; background:var(--s2); border:1px solid var(--bd); border-radius:10px; border-bottom-left-radius:3px; width:fit-content; }
.dots span { width:5px; height:5px; border-radius:50%; background:var(--blue); animation:dt 1.4s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay:.18s; }
.dots span:nth-child(3) { animation-delay:.36s; }
@keyframes dt { 0%,80%,100%{opacity:.15;transform:scale(.7)} 40%{opacity:1;transform:scale(1)} }

/* ===== WELCOME ===== */
#welcome {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; padding:30px; text-align:center;
}
.w-icon {
  font-family:var(--mono); font-size:46px;
  background:linear-gradient(135deg, var(--blue), var(--green));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow {
  0%,100%{filter:drop-shadow(0 0 12px rgba(59,130,246,.35))}
  50%{filter:drop-shadow(0 0 28px rgba(16,185,129,.7))}
}
.w-title { font-family:var(--mono); font-size:17px; letter-spacing:4px; }
.w-sub { font-size:13px; color:var(--dim2); max-width:400px; line-height:1.8; }
.w-langs { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
.w-lang {
  padding:3px 10px; border-radius:20px;
  border:1px solid var(--bd); background:var(--s2);
  font-family:var(--mono); font-size:9px; color:var(--dim2); letter-spacing:.5px;
}
.w-sugs { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:520px; }
.w-sug {
  padding:6px 13px; border-radius:20px;
  border:1px solid var(--bd); background:var(--s2);
  color:var(--dim2); font-size:12px; cursor:pointer; transition:all .2s;
}
.w-sug:hover { border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,.07); }

/* ===== INPUT ===== */
#input-area {
  padding:13px 17px;
  border-top:1px solid var(--bd);
  background:var(--s1); flex-shrink:0;
}
#input-box {
  display:flex; gap:9px; align-items:flex-end;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:10px; padding:9px 13px; transition:border .2s;
}
#input-box:focus-within { border-color:var(--blue); }
#user-input {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-family:var(--sans); font-size:14px;
  resize:none; max-height:120px; line-height:1.6;
}
#user-input::placeholder { color:var(--dim); }
#send-btn {
  width:35px; height:35px; border-radius:7px;
  border:none;
  background:linear-gradient(135deg, var(--blue), #1d4ed8);
  color:#fff; cursor:pointer; font-size:14px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
#send-btn:hover  { filter:brightness(1.15); transform:scale(1.06); }
#send-btn:active { transform:scale(.95); }
#send-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; filter:none; }
.input-hint { font-size:10px; color:var(--dim); margin-top:5px; text-align:center; font-family:var(--mono); letter-spacing:.3px; }

/* ===== MODALS ===== */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.82); backdrop-filter:blur(7px);
  z-index:200; align-items:center; justify-content:center;
}
.overlay.on { display:flex; }
@keyframes min { from{transform:scale(.93);opacity:0} to{transform:scale(1);opacity:1} }
.m-inner {
  background:var(--s1); border:1px solid var(--bd);
  border-radius:var(--r); overflow:hidden;
  animation:min .2s ease;
}
.m-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 15px; border-bottom:1px solid var(--bd);
}
.m-title { font-family:var(--mono); font-size:12px; color:var(--green); }
.m-close { background:none; border:none; color:var(--dim); font-size:20px; cursor:pointer; transition:color .2s; line-height:1; }
.m-close:hover { color:var(--pink); }

/* preview */
#prev-modal .m-inner { width:93vw; height:87vh; display:flex; flex-direction:column; }
#prev-frame { flex:1; border:none; background:#fff; }

/* teach */
#teach-modal .m-inner { width:460px; max-width:95vw; }
.teach-body { padding:15px; display:flex; flex-direction:column; gap:11px; }
.teach-body label { font-size:10px; color:var(--dim); display:block; margin-bottom:3px; letter-spacing:.5px; text-transform:uppercase; }
.teach-body input,
.teach-body select,
.teach-body textarea {
  width:100%; padding:8px 11px;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:7px; color:var(--text);
  font-family:var(--sans); font-size:13px;
  outline:none; transition:border .2s;
}
.teach-body textarea { height:130px; resize:vertical; font-family:var(--mono); font-size:11px; line-height:1.6; }
.teach-body input:focus,
.teach-body select:focus,
.teach-body textarea:focus { border-color:var(--blue); }
.m-foot { display:flex; gap:7px; justify-content:flex-end; padding:11px 15px; border-top:1px solid var(--bd); }
.m-btn { padding:7px 18px; border-radius:7px; border:none; font-size:13px; cursor:pointer; font-family:var(--sans); transition:all .2s; }
.m-btn.save   { background:var(--green); color:#000; font-weight:700; }
.m-btn.save:hover { background:#0ea570; }
.m-btn.cancel { background:var(--bd); color:var(--dim2); }
.m-btn.cancel:hover { color:var(--text); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <span class="logo">カイ AI</span>
  <span class="ver">v4.0</span>
  <span class="dot"></span>
  <span id="mode-badge">IDLE</span>
  <div class="hbtns">
    <button class="hbtn" onclick="toggleSidebar()">サイドバー</button>
    <button class="hbtn" onclick="openTeach()">＋ 教える</button>
    <button class="hbtn" onclick="resetSession()">↺ リセット</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="stabs">
      <button class="stab on"  onclick="showTab('tmpl',this)">テンプレ</button>
      <button class="stab"     onclick="showTab('mem',this)">メモリ</button>
      <button class="stab"     onclick="showTab('api',this)">API</button>
    </div>
    <div class="spanel on" id="sp-tmpl"></div>
    <div class="spanel"    id="sp-mem"></div>
    <div class="spanel"    id="sp-api"></div>
  </div>

  <!-- CHAT -->
  <div id="chat-wrap">

    <!-- progress -->
    <div id="progress">
      <div class="pg-row">
        <span class="pg-lbl" id="pg-lbl">STEP 1/5</span>
        <div class="pg-bar"><div class="pg-fill" id="pg-fill" style="width:0%"></div></div>
      </div>
      <div class="pg-steps">
        <div class="pg-step active" id="ps0"></div>
        <div class="pg-step"        id="ps1"></div>
        <div class="pg-step"        id="ps2"></div>
        <div class="pg-step"        id="ps3"></div>
        <div class="pg-step"        id="ps4"></div>
      </div>
    </div>

    <!-- messages -->
    <div id="chat">
      <div id="welcome">
        <div class="w-icon">⬡</div>
        <div class="w-title">KAI AI v4</div>
        <div class="w-sub">9言語対応のコード生成AI。5回のやり取りで要件を整理して最適なコードを生成します。</div>
        <div class="w-langs" id="w-langs"></div>
        <div class="w-sugs"  id="w-sugs"></div>
      </div>
    </div>

    <!-- input -->
    <div id="input-area">
      <div id="input-box">
        <textarea id="user-input" rows="1" placeholder="何を作りますか？ (Enterで送信 / Shift+Enterで改行)"></textarea>
        <button id="send-btn" onclick="doSend()">▶</button>
      </div>
      <div class="input-hint">ENTER で送信 ／ SHIFT+ENTER で改行</div>
    </div>

  </div><!-- /chat-wrap -->
</div><!-- /main -->

<!-- PREVIEW MODAL -->
<div class="overlay" id="prev-modal">
  <div class="m-inner">
    <div class="m-head">
      <span class="m-title">▶ PREVIEW</span>
      <button class="m-close" onclick="closePrev()">✕</button>
    </div>
    <iframe id="prev-frame"></iframe>
  </div>
</div>

<!-- TEACH MODAL -->
<div class="overlay" id="teach-modal">
  <div class="m-inner">
    <div class="m-head">
      <span class="m-title">📚 パターンを教える</span>
      <button class="m-close" onclick="closeTeach()">✕</button>
    </div>
    <div class="teach-body">
      <div>
        <label>キーワード（カンマ区切り）</label>
        <input id="tk" placeholder="例: グラフ, chart, 円グラフ">
      </div>
      <div>
        <label>名前</label>
        <input id="tn" placeholder="例: Chart.js グラフ">
      </div>
      <div>
        <label>言語</label>
        <select id="tl">
          <option value="html">HTML/CSS/JS</option>
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
          <option value="typescript">TypeScript</option>
          <option value="rust">Rust</option>
          <option value="c">C</option>
          <option value="cpp">C++</option>
          <option value="csharp">C#</option>
          <option value="java">Java</option>
          <option value="pyscript">PyScript</option>
        </select>
      </div>
      <div>
        <label>コード</label>
        <textarea id="tc" placeholder="コードをここに貼り付け..."></textarea>
      </div>
    </div>
    <div class="m-foot">
      <button class="m-btn cancel" onclick="closeTeach()">キャンセル</button>

// ── constants ──
const VER = '4.0';
const MEM_KEY = 'kai_v4';
const LANG_LABEL = {
  html:'HTML/CSS/JS', javascript:'JavaScript', typescript:'TypeScript',
  python:'Python', rust:'Rust', c:'C', cpp:'C++', csharp:'C#',

const LANG_EXT = {
  html:'html', javascript:'js', typescript:'ts',

};
const GH_LANG = {
  html:'html', javascript:'javascript', typescript:'typescript',
  python:'python', rust:'rust', c:'c', cpp:'c++', csharp:'c%23',
  java:'java', pyscript:'html'
};

// Code store: id → full code string (avoids attribute encoding issues)
const CODE_STORE = new Map();

// ── memory ──
function loadMem() {
  try { return JSON.parse(localStorage.getItem(MEM_KEY)) || {learned:[], scores:{}}; }
  catch(_) { return {learned:[], scores:{}}; }
}
function saveMem(m) { try { localStorage.setItem(MEM_KEY, JSON.stringify(m)); } catch(_) {} }
function addLearned(kw, name, lang, code) {
  const m = loadMem();
  m.learned.unshift({ id:'u'+Date.now(), keywords:kw, name, language:lang, code, uses:0, added:new Date().toLocaleDateString('ja') });
  saveMem(m); renderMem();
}
function delLearned(id) {
  const m = loadMem();
  m.learned = m.learned.filter(x => x.id !== id);
  saveMem(m); renderMem();
}
function rateItem(id, good) {
  const m = loadMem();
  if (!m.scores[id]) m.scores[id] = {g:0,b:0};
  good ? m.scores[id].g++ : m.scores[id].b++;
  saveMem(m);
}
function getScore(id) {
  const m = loadMem(), s = m.scores[id];
  if (!s) return null;
  const t = s.g + s.b;
  return t ? Math.round(s.g / t * 100) : null;
}

// ── language detect ──

  if (/java(?!script)/.test(i)) return 'java';
  if (/javascript|js\b/.test(i)) return 'javascript';
  return null;
}

interface Item {
  id: string;
  name: string;
  value: unknown;
  createdAt: Date;
}
type Result<T> = { ok: true; data: T } | { ok: false; error: string };

class ${plan.topic.replace(/\W/g,'')||'App'} {
  private items = new Map<string, Item>();
  private handlers = new Map<string, Function[]>();

  on(ev: string, fn: Function) { (this.handlers.get(ev) ?? this.handlers.set(ev,[]).get(ev)!).push(fn); return this; }
  private emit(ev: string, d: unknown) { (this.handlers.get(ev)??[]).forEach(f=>f(d)); }

  add(name: string, value?: unknown): Result<Item> {
    const item: Item = { id: crypto.randomUUID().slice(0,8), name, value, createdAt: new Date() };
    this.items.set(item.id, item);
    this.emit('add', item);
    return { ok:true, data:item };
  }
  get(id: string)    { return this.items.get(id) ?? null; }
  remove(id: string) { const ok = this.items.delete(id); if(ok) this.emit('remove',id); return ok; }
  all()   { return [...this.items.values()]; }
  size()  { return this.items.size; }
  search(q: string) { return this.all().filter(i=>i.name.toLowerCase().includes(q.toLowerCase())); }
  stats() {
    const vals = this.all().map(i=>Number(i.value)).filter(Number.isFinite);
    return { count:this.size(), sum:vals.reduce((a,b)=>a+b,0), avg: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0 };
  }
}

    fn remove(&mut self, id: u64) -> bool {
        let before = self.items.len();
        self.items.retain(|i|i.id!=id);
        self.items.len() < before
    }
    fn stats(&self) -> HashMap<&str,f64> {
        let mut m = HashMap::new();
        m.insert("count",self.items.len() as f64);
        m.insert("sum",  self.items.iter().map(|i|i.value).sum());
        m.insert("max",  self.items.iter().map(|i|i.value).fold(f64::NEG_INFINITY,f64::max));
        m
    }
    fn show(&self) {
        println!("\\n=== ${plan.topic} ({} 件) ===", self.items.len());
        for i in &self.items { println!("  [{:>3}] {:<20} = {:.2}", i.id, i.name, i.value); }
        println!("{:?}", self.stats());
    }
}

fn main() {
    let mut app = App::default();
    let stdin = io::stdin();
    let mut out = io::stdout();
    println!("${plan.topic} 起動。help でコマンド一覧。");
    for line in stdin.lock().lines() {
        let line = line.unwrap();
        let p: Vec<&str> = line.trim().splitn(3,' ').collect();
        match p.as_slice() {
            ["add",n,v] => if let Ok(v)=v.parse(){println!("追加 id:{}",app.add(n,v));}else{println!("数値エラー");}
            ["list"|"ls"] => app.show(),
            ["remove"|"rm",id] => if let Ok(id)=id.parse(){println!("{}",if app.remove(id){"削除"}else{"なし"});}
            ["help"] => println!("add <名> <値> | list | remove <id> | quit"),
            ["quit"|"q"] => {println!("終了");break;}
            _ => println!("help を参照"),
        }
        print!("> "); out.flush().ok();
    }
}
`;
}

int add(App*a,const char*name,double v){

}
int rem(App*a,int id){
  for(int i=0;i<a->n;i++)if(a->items[i].id==id){
    for(int j=i;j<a->n-1;j++)a->items[j]=a->items[j+1];

}

function generate(plan) {
  const l = (plan.language||'html').toLowerCase().replace('c++','cpp').replace('c#','csharp');
  const generators = {
    html:genHTML, python:genPython, typescript:genTypeScript,
    rust:genRust, c:genC, cpp:genCPP, csharp:genCSharp,
    java:genJava, pyscript:genPyScript, javascript:genJavaScript
  };
  const code = (generators[l] || genHTML)(plan);
  const lang = l in generators ? l : 'html';
  return { lang, code };
}

// ══════════════════════════════════════════
// GATHERING ENGINE
// ══════════════════════════════════════════
const S = {
  busy: false,
  mode: 'idle',   // idle | gathering | done
  round: 0,
  plan: {}
};

function setMode(m) {
  S.mode = m;
  const b = document.getElementById('mode-badge');
  b.textContent = m.toUpperCase();
  b.className = m === 'gathering' ? 'mode-badge gathering' : m === 'done' ? 'mode-badge ready' : 'mode-badge';
}

const GATHER_Q = [
  p=>`[1/5] 🔤 **使用言語を選んでください**\n\n「${p.topic}」ですね！\n\n• HTML/CSS/JS — ブラウザUI\n• Python — スクリプト/AI/Web\n• TypeScript — 型付きJS\n• Rust — 高速CLI\n• C / C++ / C# — システム/Desktop\n• Java — サーバー/Android\n• PyScript — HTMLの中でPython\n\n（言語名を入力）`,
  p=>`[2/5] ⚙️ **必要な機能を教えてください**\n\n**${LANG_LABEL[p.language]||p.language}** で **${p.topic}**\n\n例: ログイン・バリデーション、データ保存、グラフ表示、ファイル読み込み、検索機能、API連携...`,
  p=>`[3/5] 📥 **入出力・データ形式は？**\n\n例:\n・ユーザーが入力 → 表示\n・ファイルを読む → 処理\n・APIを呼ぶ → 結果を表示\n\n（「標準」でもOK）`,
  p=>`[4/5] 🎨 **スタイル・追加条件は？**\n\n例: ダークモード、レスポンシブ、アニメーション、シンプル、モバイルファースト\n\n（「なし」でもOK）`,
  p=>`[5/5] ✅ **以下の内容で生成します**\n\n📌 **内容**: ${p.topic}\n🔤 **言語**: ${LANG_LABEL[p.language]||p.language}\n⚙️ **機能**: ${p.features||'基本機能'}\n📥 **入出力**: ${p.io||'標準'}\n🎨 **スタイル**: ${p.style||'シンプル'}\n\nGitHubから参考実装も検索します。\n\n**「OK」「はい」「生成して」で開始！**`
];

function parseLang(s) {
  const i = s.toLowerCase();
  if (/pyscript/.test(i)) return 'pyscript';
  if (/python/.test(i)) return 'python';
  if (/typescript/.test(i)) return 'typescript';
  if (/rust/.test(i)) return 'rust';
  if (/c#|csharp/.test(i)) return 'csharp';
  if (/c\+\+|cpp/.test(i)) return 'cpp';
  if (/\bc\b|c言語/.test(i)) return 'c';
  if (/java(?!script)/.test(i)) return 'java';
  if (/javascript|\bjs\b/.test(i)) return 'javascript';
  if (/html|css|web|ウェブ/.test(i)) return 'html';
  return null;
}

function isYes(s) {
  return /^(ok|yes|は[いぃ]|生成|開始|よし|どうぞ|go|お願い)/i.test(s.trim());
}

function isCodeReq(s) {
  return /作って|作りたい|作る|書いて|欲しい|生成|create|make|build|write|コード|アプリ|ツール|プログラム|スクリプト/.test(s);
}

async function stepGather(input) {
  const p = S.plan;
  if (S.round === 0) {
    p.topic = input.trim();
    const dl = detectLang(input);
    if (dl) { p.language = dl; S.round = 2; setPG(2); return GATHER_Q[1](p); }
    S.round = 1; setPG(1); return GATHER_Q[0](p);
  }
  if (S.round === 1) { p.language = parseLang(input)||'html'; S.round = 2; setPG(2); return GATHER_Q[1](p); }
  if (S.round === 2) { p.features = input.trim(); S.round = 3; setPG(3); return GATHER_Q[2](p); }
  if (S.round === 3) { p.io    = input.trim(); S.round = 4; setPG(4); return GATHER_Q[3](p); }
  if (S.round === 4) { p.style = input.trim(); S.round = 5; setPG(5); return GATHER_Q[4](p); }
  if (S.round === 5) {
    if (!isYes(input) && input.trim().length > 5) p.features += ' ' + input.trim();
    return null; // → generate
  }
  return null;
}

function setPG(n) {
  document.getElementById('progress').classList.add('on');
  document.getElementById('pg-lbl').textContent  = `STEP ${n}/5`;
  document.getElementById('pg-fill').style.width = (n/5*100)+'%';
  for (let i=0;i<5;i++) {
    const el = document.getElementById('ps'+i);
    el.className = 'pg-step' + (i<n-1?' done':i===n-1?' active':'');
  }
}

// ══════════════════════════════════════════
// MAIN HANDLER (called by send button onclick)
// ══════════════════════════════════════════
async function doSend() {
  if (S.busy) return;
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';

  // remove welcome
  const w = document.getElementById('welcome');
  if (w) w.remove();

  addUser(text);
  S.busy = true;
  document.getElementById('send-btn').disabled = true;

  const dot = addDots();
  await sleep(300 + Math.random()*350);

  try {
    // greetings
    if (/^(こんにちは|hello|hi|やあ|おはよう|どうも)/i.test(text.trim())) {
      removeDots(dot); addAI('こんにちは！何を作りますか？\n\n「Pythonのスクレイパーを作って」「ダッシュボードが欲しい」など自由に話しかけてください。'); return;
    }
    // help
    if (/使い方|help|ヘルプ|できること/.test(text)) {
      removeDots(dot); addAI(`カイ AI v${VER} — 機能一覧\n\n📌 **9言語対応**: HTML/CSS/JS, Python, TypeScript, Rust, C, C++, C#, Java, PyScript\n🧠 **5ラウンド設計**: 要件を整理してから一気に生成\n⚡ **即時生成**: 「ボタン作って」など短い指示もOK\n🐙 **GitHub検索**: 関連実装を自動参照\n📚 **学習**: 「教える」で新パターン登録\n🔌 **外部API**: window.KaiAI で使用可能`); return;
    }
    // gathering mode
    if (S.mode === 'gathering') {
      const reply = await stepGather(text);
      removeDots(dot);
      if (reply !== null) { addAI(reply); return; }
      await doGenerate(); return;
    }
    // memory quick match
    const mm = memMatch(text);
    if (mm) {
      removeDots(dot);
      addCodeMsg(mm.name, mm.language, mm.code, mm.id);
      return;
    }
    // code request → start gathering
    if (isCodeReq(text)) {
      setMode('gathering');
      S.round = 0; S.plan = {};
      const reply = await stepGather(text);
      removeDots(dot);
      if (reply !== null) { addAI(reply); return; }
      await doGenerate(); return;
    }
    // fallback
    removeDots(dot);
    addAI('うーん、よく分かりませんでした😅\n\n「ログインフォームを作って」「PythonでスクレイパーをHTML/CSS/JSで作りたい」など、具体的に話しかけてください！');

  } catch(err) {
    removeDots(dot);
    addAI('⚠ エラー: ' + err.message);
  } finally {
    S.busy = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }
}

async function doGenerate() {
  // search github
  addAI(`⏳ **GitHub で参考実装を検索中...**\n言語: ${LANG_LABEL[S.plan.language]||S.plan.language}`);
  const refs = await ghSearch(S.plan.topic, S.plan.language);
  if (refs.length) {
    addAI(`🐙 **${refs.length}件 の参考リポジトリ**を発見しました`);
    addGH(refs);
    await sleep(600);
  }
  const dot2 = addDots();
  await sleep(500);
  removeDots(dot2);

  const r = generate(S.plan);
  const id = 'g' + Date.now();
  addCodeMsg(`${S.plan.topic} (${LANG_LABEL[r.lang]||r.lang})`, r.lang, r.code, id);

  // auto-learn
  const m = loadMem();
  m.learned.unshift({ id, keywords:S.plan.topic.split(/\s+/).slice(0,5), name:S.plan.topic, language:r.lang, code:r.code, uses:1, added:new Date().toLocaleDateString('ja') });
  saveMem(m); renderMem();

  setMode('done');
  document.getElementById('progress').classList.remove('on');
}

function memMatch(input) {
  const low = input.toLowerCase();
  const m = loadMem();
  for (const p of m.learned) {
    if (p.keywords.some(k => low.includes(k.toLowerCase()))) return p;
  }
  return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addUser(text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg user';
  const ava = document.createElement('div'); ava.className='ava'; ava.textContent='YOU';

  bub.textContent = text;

}

function fmtText(s) {
  // Only bold and newline — no raw HTML injection from user data
  return s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function addAI(text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg ai';
  const ava = document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const bub = document.createElement('div'); bub.className='bub';
  bub.innerHTML = fmtText(text);   // fmtText escapes < > before bolding
  row.append(ava, bub);
  chat.append(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function addDots() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div'); row.className='msg ai';
  const ava = document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const d   = document.createElement('div'); d.className='dots';
  d.innerHTML='<span></span><span></span><span></span>';
  row.append(ava, d);
  chat.append(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}
function removeDots(el) { if (el && el.parentNode) el.remove(); }

function addGH(refs) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div'); row.className='msg ai';
  const ava = document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const bub = document.createElement('div'); bub.className='bub';
  const wrap= document.createElement('div'); wrap.className='gh-refs';

  refs.forEach(r => {
    const a = document.createElement('a');
    a.className='gh-ref'; a.href=r.url; a.target='_blank'; a.rel='noopener';
    const info = document.createElement('div'); info.className='gh-info';
    const nm   = document.createElement('div'); nm.className='gh-name';   nm.textContent = r.name;
    const dc   = document.createElement('div'); dc.className='gh-desc';   dc.textContent = r.desc;
    const st   = document.createElement('span'); st.className='gh-stars'; st.textContent = '★ ' + (r.stars >= 1000 ? (r.stars/1000).toFixed(1)+'k' : r.stars);
    info.append(nm, dc);
    a.innerHTML='<span style="font-size:15px">📦</span>';
    a.append(info, st);
    wrap.append(a);
  });
  bub.append(wrap);
  row.append(ava, bub);
  chat.append(row);
  chat.scrollTop = chat.scrollHeight;
}

function addCodeMsg(name, lang, code, id) {
  // Store full code in JS Map — NOT in DOM attribute → no encoding issues
  CODE_STORE.set(id, code);

  const chat = document.getElementById('chat');
  const row  = document.createElement('div'); row.className='msg ai';
  const ava  = document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const bub  = document.createElement('div'); bub.className='bub';

  // header text
  const hdr = document.createElement('div');
  hdr.innerHTML = '<span style="color:var(--green)">✅</span> <strong>' +
    name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</strong> を生成しました';
  hdr.style.marginBottom = '8px';

  // code wrapper
  const cw   = document.createElement('div'); cw.className='code-wrap';
  const head = document.createElement('div'); head.className='code-head';
  const lbl  = document.createElement('span'); lbl.className='code-lang '+lang; lbl.textContent=LANG_LABEL[lang]||lang;
  const acts = document.createElement('div'); acts.className='code-btns';

  const btnCopy = document.createElement('button'); btnCopy.className='cbtn'; btnCopy.textContent='コピー';
  btnCopy.onclick = () => copyCode(id, btnCopy);

  const canPreview = lang==='html'||lang==='pyscript';
  if (canPreview) {
    const btnPrev = document.createElement('button'); btnPrev.className='cbtn preview'; btnPrev.textContent='▶ プレビュー';
    btnPrev.onclick = () => openPrev(id);
    acts.append(btnPrev);
  }
  const btnDl = document.createElement('button'); btnDl.className='cbtn download'; btnDl.textContent='保存';
  btnDl.onclick = () => dlCode(id, name, lang);

  acts.append(btnCopy, btnDl);
  head.append(lbl, acts);

  // *** KEY FIX: use textarea with textContent — CSS cannot escape ***
  const ta = document.createElement('textarea');
  ta.className = 'code-area';
  ta.readOnly   = true;
  ta.rows       = Math.min(code.split('\n').length, 18);
  ta.textContent = code.length > 900 ? code.slice(0, 900) + '\n…(省略)' : code;

  cw.append(head, ta);

  // feedback row
  const fb = document.createElement('div'); fb.className='fb-row';
  const fbl= document.createElement('span'); fbl.className='fb-lbl'; fbl.textContent='役に立ちましたか？';
  const fg_btn = document.createElement('button'); fg_btn.className='fbbtn g'; fg_btn.textContent='👍';
  fg_btn.onclick = () => doFeedback(fb, id, true);
  const fb_btn = document.createElement('button'); fb_btn.className='fbbtn b'; fb_btn.textContent='👎';
  fb_btn.onclick = () => doFeedback(fb, id, false);

  fb.append(fbl, fg_btn, fb_btn);
  bub.append(hdr, cw, fb);
  row.append(ava, bub);
  chat.append(row);
  chat.scrollTop = chat.scrollHeight;
}

function copyCode(id, btn) {
  const code = CODE_STORE.get(id);
  if (!code) return;
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ コピー済み'; btn.style.color='var(--green)';
    setTimeout(() => { btn.textContent=orig; btn.style.color=''; }, 2000);
  }).catch(() => alert('コピー失敗。手動で選択してください。'));
}

function dlCode(id, name, lang) {
  const code = CODE_STORE.get(id);
  if (!code) return;
  const ext  = LANG_EXT[lang] || 'txt';
  const safe = name.replace(/[^\w\-]/g,'_');
  const blob = new Blob([code], {type:'text/plain'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=safe+'.'+ext; a.click();
  URL.revokeObjectURL(url);
}

function openPrev(id) {
  const code = CODE_STORE.get(id);
  if (!code) return;
  document.getElementById('prev-frame').srcdoc = code;
  document.getElementById('prev-modal').classList.add('on');
}
function closePrev() {
  document.getElementById('prev-modal').classList.remove('on');
  document.getElementById('prev-frame').srcdoc = '';
}

function doFeedback(row, id, good) {
  rateItem(id, good);
  row.innerHTML = good
    ? '<span style="color:var(--green);font-size:13px">👍 ありがとう！このパターンを優先します。</span>'
    : '<span style="color:var(--pink);font-size:13px">👎 了解！「教える」で改善版を登録できます。</span>';
}

// EXTERNAL API
// ══════════════════════════════════════════
window.KaiAI = {
  version: VER,
  generate: (opt={}) => Promise.resolve(generate({ topic:opt.topic||'App', language:opt.language||'html', features:opt.features||'', io:opt.io||'', style:opt.style||'' })),
  learn:   (p={}) => { if(!p.keywords||!p.name||!p.code) return {ok:false,error:'keywords,name,code required'}; addLearned(p.keywords,p.name,p.language||'html',p.code); return {ok:true}; },
  getTemplates: () => QUICK.map(t=>({id:t.kw[0],name:t.label,keywords:t.kw,language:t.lang})),
  stats:   () => { const m=loadMem(); return {learned:m.learned.length,scores:m.scores}; }
};

window.addEventListener('message', async e => {
  if (!e.data || e.data.type !== 'KAI_REQUEST') return;
  const { action, payload, id } = e.data;
  try {
    const fn = window.KaiAI[action];
    if (typeof fn !== 'function') throw new Error('Unknown action: '+action);
    const result = await fn(payload||{});
    e.source?.postMessage({ type:'KAI_RESPONSE', id, result, ok:true }, e.origin||'*');
  } catch(err) {
    e.source?.postMessage({ type:'KAI_RESPONSE', id, error:err.message, ok:false }, e.origin||'*');
  }
});
