<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODE・AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --accent3: #ff6b35;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --code-bg: #0d0d15;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,136,0.5);
  }

  .logo span {
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
    margin-left: auto;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* Chat history */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
    max-width: 900px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: 1px;
  }

  .message.user .avatar {
    background: var(--accent2);
    color: white;
  }

  .message.assistant .avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: var(--bg);
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 12px;
    max-width: 780px;
    line-height: 1.7;
    font-size: 14px;
  }

  .message.user .bubble {
    background: var(--accent2);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .message.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  /* Code blocks */
  .bubble pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 12px 0;
    overflow-x: auto;
    position: relative;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }

  .bubble pre code {
    color: var(--accent);
    white-space: pre;
  }

  .bubble code:not(pre code) {
    font-family: 'Space Mono', monospace;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent3);
    border: 1px solid var(--border);
  }

  .lang-tag {
    position: absolute;
    top: 8px;
    right: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .copy-btn {
    position: absolute;
    top: 8px;
    right: 60px;
    padding: 3px 8px;
    background: var(--border);
    border: none;
    border-radius: 4px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { background: var(--accent); color: var(--bg); }

  /* Input area */
  .input-area {
    padding: 20px 32px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(10px);
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(0,255,136,0.1);
  }

  #prompt {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 160px;
    line-height: 1.6;
    placeholder-color: var(--text-dim);
  }

  #prompt::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 18px;
  }

  #send-btn:hover { background: #00e87a; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loading indicator */
  .thinking {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.4s ease-in-out infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    gap: 24px;
  }

  .welcome-icon {
    font-size: 48px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,255,136,0.4);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(0,255,136,0.4); }
    50% { text-shadow: 0 0 40px rgba(0,255,136,0.8); }
  }

  .welcome h2 {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--text);
  }

  .welcome p {
    color: var(--text-dim);
    font-size: 14px;
    max-width: 400px;
    line-height: 1.8;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 600px;
  }

  .suggestion-btn {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.05);
  }

  /* Streaming cursor */
  .streaming-cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    animation: blink-cursor 0.7s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink-cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CODE<span>・</span>AI</div>
  <div class="tagline">コード生成エンジン</div>
  <div class="status-dot"></div>
</header>

<div class="main">
  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">&lt;/&gt;</div>
      <h2>CODE GENERATOR</h2>
      <p>何でも作ります。コードを書いてほしい内容を自由に入力してください。</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="suggest(this)">Pythonでフィボナッチ数列</button>
        <button class="suggestion-btn" onclick="suggest(this)">React カウンターコンポーネント</button>
        <button class="suggestion-btn" onclick="suggest(this)">SQLでユーザーテーブル作成</button>
        <button class="suggestion-btn" onclick="suggest(this)">JavaScriptでソートアルゴリズム</button>
        <button class="suggestion-btn" onclick="suggest(this)">CSSでアニメーション付きボタン</button>
        <button class="suggestion-btn" onclick="suggest(this)">Node.js REST API のサンプル</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="prompt" rows="1" placeholder="どんなコードを生成しますか？（例: Pythonでバブルソートを書いて）" onInput="autoResize(this)" onKeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">▶</button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたは優秀なコード生成AIです。ユーザーの指示に従い、高品質なコードを生成します。

ルール：
- 必ずコードブロック（\`\`\`言語名 ... \`\`\`）でコードを提供する
- コードには適切なコメントを日本語で付ける
- 簡潔な説明を添えて、コードの意図を伝える
- エラーハンドリングや良い実装パターンを使う
- 質問があれば答え、改善提案も行う`;

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function suggest(btn) {
  document.getElementById('prompt').value = btn.textContent;
  sendMessage();
}

function appendMessage(role, content) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'YOU' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant') {
    bubble.innerHTML = formatResponse(content);
    addCopyButtons(bubble);
  } else {
    bubble.textContent = content;
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function formatResponse(text) {
  // Escape HTML first
  const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Replace code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const langLabel = lang || 'code';
    return `<pre data-lang="${langLabel}"><button class="copy-btn" onclick="copyCode(this)">コピー</button><span class="lang-tag">${langLabel}</span><code>${escapeHtml(code.trim())}</code></pre>`;
  });

  // Replace inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Replace bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Replace line breaks
  text = text.split('\n').map(line => line || '<br>').join('\n');

  return text;
}

function addCopyButtons(bubble) {
  // buttons already inserted in formatResponse
}

function copyCode(btn) {
  const code = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ コピー済み';
    btn.style.background = 'var(--accent)';
    btn.style.color = 'var(--bg)';
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.style.background = '';
      btn.style.color = '';
    }, 2000);
  });
}

function showThinking() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'message assistant';
  row.id = 'thinking-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AI';

  const thinking = document.createElement('div');
  thinking.className = 'thinking';
  thinking.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(avatar);
  row.appendChild(thinking);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking-row');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const prompt = document.getElementById('prompt');
  const text = prompt.value.trim();
  if (!text) return;

  prompt.value = '';
  prompt.style.height = 'auto';

  appendMessage('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showThinking();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    removeThinking();

    const reply = data.content?.map(b => b.text || '').join('') || 'エラーが発生しました。';
    messages.push({ role: 'assistant', content: reply });
    appendMessage('assistant', reply);

  } catch (err) {
    removeThinking();
    appendMessage('assistant', `⚠ エラーが発生しました: ${err.message}`);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('prompt').focus();
}
</script>
</body>
</html>
