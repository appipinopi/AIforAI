<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>カイ AI v5</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#07090f;--s1:#0b0e1a;--s2:#10141f;--s3:#151b2c;
  --bd:#1a2236;--bd2:#222d44;
  --blue:#4f8ef7;--green:#22d68a;--pink:#f84e7d;--yellow:#f5b731;--purple:#9b7cf8;
  --text:#bfcfe8;--dim:#3f5270;--dim2:#607090;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --r:9px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column}

/* ── GRID BG ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(79,142,247,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,142,247,.025) 1px,transparent 1px);
  background-size:44px 44px;
}

/* ── HEADER ── */
#hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:rgba(11,14,26,.97);border-bottom:1px solid var(--bd);
  flex-shrink:0;z-index:50;backdrop-filter:blur(12px);
}
.logo{
  font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:3px;
  background:linear-gradient(90deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.ver{font-family:var(--mono);font-size:9px;color:var(--dim2);border:1px solid var(--bd);padding:2px 6px;border-radius:20px;letter-spacing:1px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pu 2s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
#thinking-badge{
  font-family:var(--mono);font-size:9px;padding:2px 9px;border-radius:20px;
  border:1px solid var(--bd);color:var(--dim2);letter-spacing:1px;
  transition:all .3s;
}
#thinking-badge.on{color:var(--yellow);border-color:var(--yellow);background:rgba(245,183,49,.07)}
.hbtns{display:flex;gap:6px;margin-left:auto}
.hbtn{
  padding:5px 11px;border:1px solid var(--bd);border-radius:6px;
  background:transparent;color:var(--dim2);font-size:11px;font-family:var(--sans);
  cursor:pointer;transition:all .2s;letter-spacing:.3px;
}
.hbtn:hover{border-color:var(--blue);color:var(--blue)}

/* ── LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
  width:236px;flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  transition:width .25s,opacity .25s;overflow:hidden;
}
#sidebar.closed{width:0;opacity:0}
.stabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.stab{
  flex:1;padding:8px 2px;border:none;background:none;
  font-size:10px;font-family:var(--sans);letter-spacing:.5px;text-transform:uppercase;
  color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
}
.stab:hover{color:var(--text)}
.stab.on{color:var(--blue);border-bottom-color:var(--blue)}
.spanel{display:none;flex:1;overflow-y:auto;padding:10px;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.spanel.on{display:flex}
.scard{padding:9px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;transition:all .2s}
.scard:hover{border-color:var(--blue);background:rgba(79,142,247,.06)}
.sc-n{font-size:12px;font-weight:500;margin-bottom:2px}
.sc-l{font-family:var(--mono);font-size:9px;color:var(--blue);letter-spacing:1px}
.sc-k{font-size:10px;color:var(--dim);margin-top:2px}
.sc-s{font-size:10px;color:var(--yellow);margin-top:3px}
.sc-del{float:right;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px}
.sc-del:hover{color:var(--pink)}
.s-empty{color:var(--dim);font-size:11px;text-align:center;padding:20px 0;line-height:1.8}
.api-ttl{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.api-blk{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:9px;font-family:var(--mono);font-size:10px;color:#5a8ab0;line-height:1.6;white-space:pre;overflow-x:auto;margin-bottom:5px}
.api-note{font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:12px}
.copy-api{width:100%;padding:5px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--dim2);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .2s;margin-bottom:14px}
.copy-api:hover{border-color:var(--blue);color:var(--blue)}

/* ── CHAT ── */
#chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#chat{
  flex:1;overflow-y:auto;padding:18px;
  display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:var(--bd) transparent;
}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

.msg{display:flex;gap:9px;opacity:0;animation:fu .28s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:70%}
.msg.ai{align-self:flex-start;max-width:96%}
.ava{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.5px;
}
.msg.user .ava{background:var(--blue);color:#000}
.msg.ai   .ava{background:linear-gradient(135deg,#1d3a8a,#0d6e46);color:#fff}
.bub{padding:10px 14px;border-radius:10px;font-size:13.5px;line-height:1.78}
.msg.user .bub{background:rgba(79,142,247,.17);border:1px solid rgba(79,142,247,.25);border-bottom-right-radius:3px}
.msg.ai   .bub{background:var(--s2);border:1px solid var(--bd);border-bottom-left-radius:3px}
.bub strong{color:var(--blue)}
.bub em{color:var(--green);font-style:normal}
.bub .hi{color:var(--yellow)}
.bub .tag-inline{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:10px;background:rgba(79,142,247,.1);color:var(--blue);border:1px solid rgba(79,142,247,.2)}

/* thinking chip inside bubble */
.think-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  background:rgba(245,183,49,.08);border:1px solid rgba(245,183,49,.2);
  font-size:11px;color:var(--yellow);font-family:var(--mono);
  margin-bottom:8px;letter-spacing:.5px;
}
.think-chip::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--yellow);animation:pu 1s ease-in-out infinite}

/* inferred lang badge */
.lang-inferred{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  background:rgba(34,214,138,.08);border:1px solid rgba(34,214,138,.2);
  font-size:11px;color:var(--green);font-family:var(--mono);
  margin-bottom:8px;letter-spacing:.5px;
}

/* code block */
.code-wrap{margin-top:10px;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.code-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 11px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--bd);
}
.code-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.code-lbl.html{color:#f97316}.code-lbl.javascript{color:#fbbf24}
.code-lbl.typescript{color:#60a5fa}.code-lbl.python{color:#4ade80}
.code-lbl.rust{color:#fb923c}.code-lbl.c{color:#94a3b8}
.code-lbl.cpp{color:#38bdf8}.code-lbl.csharp{color:#c084fc}
.code-lbl.java{color:#fcd34d}.code-lbl.pyscript{color:#6ee7b7}
.code-btns{display:flex;gap:5px}
.cbtn{
  padding:2px 9px;border-radius:4px;border:1px solid var(--bd);
  background:transparent;color:var(--dim2);font-size:10px;cursor:pointer;
  font-family:var(--sans);transition:all .2s;
}
.cbtn:hover{border-color:var(--blue);color:var(--blue)}
.cbtn.pv:hover{border-color:var(--green);color:var(--green)}
.cbtn.dl:hover{border-color:var(--yellow);color:var(--yellow)}
.code-ta{
  display:block;width:100%;
  background:#050810;color:#6b9ac4;
  font-family:var(--mono);font-size:11.5px;line-height:1.62;
  padding:12px;border:none;outline:none;resize:none;
  max-height:290px;overflow-y:auto;overflow-x:auto;
  white-space:pre;cursor:text;
  scrollbar-width:thin;scrollbar-color:var(--bd) transparent;
}

/* fb */
.fb-row{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:8px;border-top:1px solid var(--bd)}
.fb-l{font-size:11px;color:var(--dim)}
.fb-btn{padding:2px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;font-size:12px;cursor:pointer;transition:all .2s}
.fb-btn.g:hover{background:rgba(34,214,138,.1);border-color:var(--green)}
.fb-btn.b:hover{background:rgba(248,78,125,.1);border-color:var(--pink)}

/* dots */
.dots{display:flex;gap:4px;padding:11px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;border-bottom-left-radius:3px;width:fit-content}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:dt 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes dt{0%,80%,100%{opacity:.15;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* GH refs */
.gh-refs{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.gh-ref{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s3);text-decoration:none;color:var(--text);cursor:pointer;transition:all .2s}
.gh-ref:hover{border-color:var(--green)}
.gh-info{flex:1;min-width:0}
.gh-name{font-size:12px;font-weight:500;color:var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gh-desc{font-size:10px;color:var(--dim2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.gh-st{font-family:var(--mono);font-size:9px;color:var(--yellow);flex-shrink:0}

/* quick replies */
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.qr{
  padding:5px 13px;border-radius:20px;
  border:1px solid var(--bd2);background:var(--s3);
  color:var(--dim2);font-size:12px;cursor:pointer;transition:all .2s;
}
.qr:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,142,247,.07)}

/* ── WELCOME ── */
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center}
.w-icon{font-family:var(--mono);font-size:50px;background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:wg 3s ease-in-out infinite}
@keyframes wg{0%,100%{filter:drop-shadow(0 0 14px rgba(79,142,247,.4))}50%{filter:drop-shadow(0 0 30px rgba(34,214,138,.7))}}
.w-title{font-family:var(--mono);font-size:18px;letter-spacing:4px}
.w-sub{font-size:13px;color:var(--dim2);max-width:420px;line-height:1.85}
.w-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:500px}
.w-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--bd);background:var(--s2);color:var(--dim2);font-size:12px;cursor:pointer;transition:all .2s}
.w-chip:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,142,247,.07)}

/* ── INPUT ── */
#inp-area{padding:12px 16px;border-top:1px solid var(--bd);background:rgba(11,14,26,.97);flex-shrink:0}
#inp-box{display:flex;gap:9px;align-items:flex-end;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 13px;transition:border .2s}
#inp-box:focus-within{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,142,247,.07)}
#inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;resize:none;max-height:120px;line-height:1.6}
#inp::placeholder{color:var(--dim)}
#send{
  width:35px;height:35px;border-radius:7px;border:none;
  background:linear-gradient(135deg,var(--blue),#1a3fbf);
  color:#fff;cursor:pointer;font-size:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
#send:hover{filter:brightness(1.15);transform:scale(1.07)}
#send:active{transform:scale(.94)}
#send:disabled{opacity:.3;cursor:not-allowed;transform:none;filter:none}
.inp-hint{font-size:10px;color:var(--dim);margin-top:5px;text-align:center;font-family:var(--mono);letter-spacing:.3px}

/* ── MODALS ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.83);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center}
.ov.on{display:flex}
@keyframes mi{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.mi{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;animation:mi .2s ease}
.mh{display:flex;align-items:center;justify-content:space-between;padding:9px 15px;border-bottom:1px solid var(--bd)}
.mt{font-family:var(--mono);font-size:12px;color:var(--green)}
.mc{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;transition:color .2s;line-height:1}
.mc:hover{color:var(--pink)}
#pv-modal .mi{width:93vw;height:87vh;display:flex;flex-direction:column}
#pv-frame{flex:1;border:none;background:#fff}
#tc-modal .mi{width:460px;max-width:95vw}
.tbody{padding:14px;display:flex;flex-direction:column;gap:11px}
.tbody label{font-size:10px;color:var(--dim);display:block;margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
.tbody input,.tbody select,.tbody textarea{
  width:100%;padding:8px 11px;background:var(--s2);border:1px solid var(--bd);
  border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .2s;
}
.tbody textarea{height:130px;resize:vertical;font-family:var(--mono);font-size:11px;line-height:1.6}
.tbody input:focus,.tbody select:focus,.tbody textarea:focus{border-color:var(--blue)}
.mf{display:flex;gap:7px;justify-content:flex-end;padding:11px 15px;border-top:1px solid var(--bd)}
.mbtn{padding:7px 18px;border-radius:7px;border:none;font-size:13px;cursor:pointer;font-family:var(--sans);transition:all .2s}
.mbtn.save{background:var(--green);color:#000;font-weight:700}
.mbtn.save:hover{background:#15c278}
.mbtn.cancel{background:var(--bd);color:var(--dim2)}
.mbtn.cancel:hover{color:var(--text)}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <span class="logo">カイ AI</span>
  <span class="ver">v5.0</span>
  <span class="pulse"></span>
  <span id="thinking-badge">IDLE</span>
  <div class="hbtns">
    <button class="hbtn" onclick="toggleSb()">サイドバー</button>
    <button class="hbtn" onclick="openTC()">＋ 教える</button>
    <button class="hbtn" onclick="resetSess()">↺ リセット</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="sidebar">
    <div class="stabs">
      <button class="stab on" onclick="showTab('tmpl',this)">テンプレ</button>
      <button class="stab"    onclick="showTab('mem',this)">メモリ</button>
      <button class="stab"    onclick="showTab('api',this)">API</button>
    </div>
    <div class="spanel on" id="sp-tmpl"></div>
    <div class="spanel"    id="sp-mem"></div>
    <div class="spanel"    id="sp-api"></div>
  </div>

  <div id="chat-wrap">
    <div id="chat">
      <div id="welcome">
        <div class="w-icon">⬡</div>
        <div class="w-title">KAI AI v5</div>
        <div class="w-sub">日本語で話しかけるだけ。言語は自動で判断します。コード生成も会話も何でもOK。</div>
        <div class="w-chips" id="w-chips"></div>
      </div>
    </div>
    <div id="inp-area">
      <div id="inp-box">
        <textarea id="inp" rows="1" placeholder="何でも話しかけてください...（例: ログインフォームを作りたい　/ こんにちは！）"></textarea>
        <button id="send" onclick="doSend()">▶</button>
      </div>
      <div class="inp-hint">ENTER 送信 ／ SHIFT+ENTER 改行</div>
    </div>
  </div>
</div>

<!-- PREVIEW -->
<div class="ov" id="pv-modal">
  <div class="mi">
    <div class="mh"><span class="mt">▶ PREVIEW</span><button class="mc" onclick="closePV()">✕</button></div>
    <iframe id="pv-frame"></iframe>
  </div>
</div>

<!-- TEACH -->
<div class="ov" id="tc-modal">
  <div class="mi">
    <div class="mh"><span class="mt">📚 教える</span><button class="mc" onclick="closeTC()">✕</button></div>
    <div class="tbody">
      <div><label>キーワード（カンマ区切り）</label><input id="tk" placeholder="例: グラフ, chart, 棒グラフ"></div>
      <div><label>名前</label><input id="tn" placeholder="例: Chart.js グラフ"></div>
      <div><label>言語（自動判定 or 指定）</label>
        <select id="tl">
          <option value="auto">自動判定</option>
          <option value="html">HTML/CSS/JS</option>
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
          <option value="typescript">TypeScript</option>
          <option value="rust">Rust</option>
          <option value="c">C</option><option value="cpp">C++</option>
          <option value="csharp">C#</option><option value="java">Java</option>
          <option value="pyscript">PyScript</option>
        </select>
      </div>
      <div><label>コード</label><textarea id="tc" placeholder="コードをここに貼り付け..."></textarea></div>
    </div>
    <div class="mf">
      <button class="mbtn cancel" onclick="closeTC()">キャンセル</button>
      <button class="mbtn save"   onclick="saveTC()">保存・学習</button>
    </div>
  </div>
</div>

<script>
'use strict';
const VER = '5.0';
const MEM_KEY = 'kai_v5';

// ── Code store (prevents CSS bleed through DOM) ──
const CS = new Map();

// ── Lang metadata ──
const LL = {
  html:'HTML/CSS/JS', javascript:'JavaScript', typescript:'TypeScript',
  python:'Python', rust:'Rust', c:'C', cpp:'C++',
  csharp:'C#', java:'Java', pyscript:'PyScript'
};
const LE = {
  html:'html', javascript:'js', typescript:'ts', python:'py',
  rust:'rs', c:'c', cpp:'cpp', csharp:'cs', java:'java', pyscript:'html'
};
const GL = {
  html:'html', javascript:'javascript', typescript:'typescript', python:'python',
  rust:'rust', c:'c', cpp:'c++', csharp:'c%23', java:'java', pyscript:'html'
};

// ══════════════════════════════════════════════
// 🧠 LANGUAGE INFERENCE ENGINE
// ── Scores each language from signal strength ──
// ══════════════════════════════════════════════
const LANG_SIGNALS = {
  html: [
    [20, /ウェブ|web|ブラウザ|サイト|ページ|html|css|ランディング|lp\b|フロントエンド|フロント/i],
    [18, /ボタン|フォーム|ログイン|ナビ|ヘッダー|カード|モーダル|タブ|アコーディオン|スライダー/i],
    [15, /アニメーション|デザイン|レスポンシブ|スマホ|モバイル/i],
    [12, /todo|タスク|メモ|ゲーム|パズル|クイズ|計算機|電卓|タイマー|ストップウォッチ/i],
    [10, /ダッシュボード|管理|admin|ポートフォリオ|個人サイト/i],
    [8,  /表示|見た目|画面|ui\b|インターフェース/i],
  ],
  python: [
    [22, /python|パイソン/i],
    [20, /スクレイピング|クローラー|自動化|automation|bot\b|ボット/i],
    [18, /データ分析|pandas|numpy|matplotlib|機械学習|ai\b|ml\b/i],
    [15, /flask|django|fastapi|スクリプト|script/i],
    [12, /csv|json|ファイル処理|batch|バッチ/i],
    [10, /コマンド|cli\b/i],
  ],
  typescript: [

function inferLanguage(input, context = '') {
  const full = (input + ' ' + context).toLowerCase();
  const scores = {};
  for (const [lang, signals] of Object.entries(LANG_SIGNALS)) {
    scores[lang] = 0;
    for (const [weight, re] of signals) {
      if (re.test(full)) scores[lang] += weight;
    }
  }
  // Default boost for generic web/app requests with no strong signals
  const topScore = Math.max(...Object.values(scores));
  if (topScore < 8) scores.html += 8;    // default to HTML for ambiguous requests
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const winner = sorted[0][0];
  const confidence = topScore >= 18 ? 'high' : topScore >= 8 ? 'medium' : 'low';
  return { lang:winner, score:scores[winner], confidence, scores };
}

function langReason(lang, input) {
  const i = input.toLowerCase();
  const reasons = {
    html:       ['ウェブUI', 'ブラウザで動く', 'フロントエンド'],

// Intent detection
function detectIntent(input) {
  const i = input.trim().toLowerCase();
  if (/^(こんにちは|hello|hi|やあ|おはよう|こんばん|どうも|はじめまして)/.test(i)) return 'greet';
  if (/(ありがとう|サンクス|thanks|助かった|完璧|すごい|最高|よかった)/.test(i)) return 'thanks';
  if (/(ごめん|すまない|間違|違う|そうじゃな|ちが)/.test(i)) return 'correction';
  if (/(what|who|why|how|いつ|なぜ|なに|どう|教えて|とは|について|説明|意味|仕組み)/.test(i) && !isCodeReq(i)) return 'question';
  if (/(できる|何ができ|機能|help|ヘルプ|使い方|できること)/.test(i)) return 'help';
  if (/(覚えてる|記憶|前|さっき|さっきの|その|続き|修正|変えて|追加して|直して)/.test(i)) return 'refine';
  if (/(ok|は[いぃ]|いいよ|やって|お願い|生成|作って|進め|どうぞ|go|sure)/.test(i) && SESSION.topic) return 'confirm';
  if (isCodeReq(i)) return 'code';
  if (i.length < 12 && !/[。.?？]/.test(i)) return 'chat';
  return 'chat';
}

function isCodeReq(s) {
  return /作って|作りたい|作る|書いて|ほしい|欲しい|生成|つくって|create|make|build|write|プログラム|コード|アプリ|ツール|スクリプト|implement|実装/.test(s);
}

// ── Session-aware conversation ──
function buildConvResponse(input, intent) {
  const i = input.trim();
  const hasContext = !!SESSION.topic;

  if (intent === 'greet')      return { type:'text', text:genGreet(), qr:['コードを作って','質問があります','使い方を教えて'] };
  if (intent === 'thanks')     return { type:'text', text:genThanks(), qr:[] };
  if (intent === 'help')       return { type:'text', text:genHelp(), qr:['ログインフォームを作って','Pythonスクリプト','TypeScriptコンポーネント'] };
  if (intent === 'question')   return { type:'text', text:genQuestion(i), qr:[] };

  if (intent === 'correction') {
    SESSION.topic = ''; SESSION.lang = ''; SESSION.features = [];
    return { type:'text', text:'了解！どう変えますか？もう一度教えてください。', qr:[] };
  }

  if (intent === 'refine' && hasContext) {
    // Refine existing
    const extra = i.replace(/(修正|変えて|追加して|直して|続き)/g,'').trim();
    if (extra) SESSION.features.push(extra);
    return { type:'generate', reason:'修正・追加リクエスト' };
  }

  if (intent === 'confirm' && hasContext) {
    return { type:'generate', reason:'確認後生成' };
  }

  if (intent === 'code') {
    // Extract topic
    SESSION.topic = extractTopic(i);
    SESSION.features = extractFeatures(i);
    SESSION.style = extractStyle(i);
    const infer = inferLanguage(i, SESSION.topic + ' ' + SESSION.features.join(' '));
    SESSION.lang = infer.lang;

    // High confidence → generate immediately
    if (infer.confidence === 'high') return { type:'generate', reason:'高確信度で自動判定' };

    // Medium → generate with explanation
    if (infer.confidence === 'medium') return { type:'generate', reason:'自動判定して生成' };

    // Low → ask one clarifying question
    return {
      type: 'clarify',
      text: `**「${SESSION.topic}」**ですね！少しだけ確認させてください。\n\n${genClarifyQ(i)}`,
      qr: genClarifyChoices(infer)
    };
  }

  // Pure chat
  return { type:'text', text:genChatResp(i), qr:[] };
}

function extractTopic(s) {
  return s
    .replace(/作って|作りたい|作る|書いて|ほしい|欲しい|生成して|つくって|お願い/g,'')
    .replace(/python|typescript|javascript|rust|html|java\b|c#|c\+\+|pyscript/gi,'')
    .replace(/で|を|が|に|の|は|も|って|から|ため|用の/g,' ')
    .replace(/\s+/g,' ').trim()
    .slice(0,40) || 'アプリ';
}

function extractFeatures(s) {
  const feats = [];
  const checks = [
    [/ログイン|認証|auth/,   'ログイン機能'],
    [/検索|search/,          '検索機能'],
    [/保存|save|db|データベース/, 'データ保存'],
    [/グラフ|chart|可視化/,  'グラフ表示'],
    [/api/i,                 'API連携'],
    [/ファイル|upload/,      'ファイル操作'],
    [/通知|notification/,    '通知機能'],
    [/リスト|一覧/,          'リスト表示'],
    [/フォーム|入力/,        'フォーム'],
  ];
  for (const [re,feat] of checks) { if (re.test(s)) feats.push(feat); }
  return feats;
}

function extractStyle(s) {
  if (/dark|ダーク/.test(s)) return 'dark';
  if (/シンプル|simple|ミニマル/.test(s)) return 'simple';
  if (/かわいい|cute|ポップ/.test(s)) return 'cute';
  if (/モダン|modern/.test(s)) return 'modern';
  return '';
}

function genClarifyQ(input) {
  return `どんな用途で使いますか？\n\n・**Webブラウザで動くUI**が欲しい\n・**Pythonスクリプト**として動かしたい\n・**CLIツール**として使いたい\n・**その他**（自由に教えてください）`;
}

function genClarifyChoices(infer) {
  const top3 = Object.entries(infer.scores)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3)
    .map(([l]) => LL[l]+'で作って');
  return top3;
}

function genChatResp(input) {
  const i = input.toLowerCase();
  if (/疲れた|つかれた/.test(i)) return '少し休憩するといいですよ☕\n\nコーディングの合間に気分転換は大事！何か作りたくなったらいつでもどうぞ。';

  if (/何歳|なんさい/.test(i)) return 'AIなので年齢はないですが、v5.0です！\n日々学習して進化しています ⚡';

// ── GitHub search ──
async function ghSearch(q, lang) {
  try {
    const url=`https://api.github.com/search/repositories?q=${encodeURIComponent(q.slice(0,40))}+language:${GL[lang]||'html'}&sort=stars&order=desc&per_page=4`;
    const r=await fetch(url,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok)return[];
    const d=await r.json();
    return(d.items||[]).slice(0,3).map(x=>({name:x.full_name,desc:x.description||'説明なし',stars:x.stargazers_count,url:x.html_url}));
  }catch{return[]}
}

function loadMem(){try{return JSON.parse(localStorage.getItem(MEM_KEY))||{learned:[],scores:{}};}catch{return{learned:[],scores:{}}}}

function delLearned(id){const m=loadMem();m.learned=m.learned.filter(x=>x.id!==id);saveMem(m);renderMem()}

function memMatch(input){const low=input.toLowerCase();const m=loadMem();for(const p of m.learned){if(p.keywords.some(k=>low.includes(k.toLowerCase())))return p;}return null}

// MAIN SEND HANDLER

let BUSY = false;
let sbOpen = true;

async function doSend() {
  if (BUSY) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  const w = document.getElementById('welcome');
  if (w) w.remove();
  addUser(text);
  SESSION.messages.push({role:'user',text});
  SESSION.turnCount++;
  BUSY = true;
  document.getElementById('send').disabled = true;
  setThinking(true);
  const dots = addDots();

  try {
    await sleep(280 + Math.random()*320);
    const intent = detectIntent(text);
    // memory quick match
    const mm = memMatch(text);
    if (mm && intent === 'code') {
      removeDots(dots);
      addInferred(mm.language, '記憶から一致');
      await sleep(200);
      await generateFlow({...SESSION, lang:mm.language, topic:mm.name, features:[]}, mm.code);
      return;
    }

    const res = buildConvResponse(text, intent);

    if (res.type === 'text') {
      removeDots(dots);
      addAI(res.text, res.qr||[]);
    } else if (res.type === 'clarify') {
      removeDots(dots);
      addAI(res.text, res.qr||[]);
    } else if (res.type === 'generate') {
      removeDots(dots);
      await fullGenerate();
    }
  } catch(e) {
    removeDots(dots);
    addAI('⚠ エラーが発生しました: ' + e.message, []);
  } finally {
    BUSY = false;
    document.getElementById('send').disabled = false;
    setThinking(false);
    document.getElementById('inp').focus();
  }
}

  const row=document.createElement('div'); row.className='msg ai';
  const ava=document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const bub=document.createElement('div'); bub.className='bub';
  const chip=document.createElement('div'); chip.className='think-chip'; chip.textContent=text;
  bub.append(chip); row.append(ava,bub); chat.append(row); chat.scrollTop=chat.scrollHeight;
}

function addInferred(lang, reason) {
  const chat=document.getElementById('chat');
  const row=document.createElement('div'); row.className='msg ai';
  const ava=document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const bub=document.createElement('div'); bub.className='bub';
  const chip=document.createElement('div'); chip.className='lang-inferred'; chip.textContent=`${LL[lang]||lang} — ${reason}`;
  bub.append(chip); row.append(ava,bub); chat.append(row); chat.scrollTop=chat.scrollHeight;
}

function addDots(){
  const chat=document.getElementById('chat');
  const row=document.createElement('div'); row.className='msg ai';
  const ava=document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const d=document.createElement('div'); d.className='dots';
  d.innerHTML='<span></span><span></span><span></span>';
  row.append(ava,d); chat.append(row); chat.scrollTop=chat.scrollHeight; return row;
}
function removeDots(el){if(el&&el.parentNode)el.remove()}

function addGH(refs){
  const chat=document.getElementById('chat');
  const row=document.createElement('div'); row.className='msg ai';
  const ava=document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const bub=document.createElement('div'); bub.className='bub';
  const wrap=document.createElement('div'); wrap.className='gh-refs';
  refs.forEach(r=>{
    const a=document.createElement('a'); a.className='gh-ref'; a.href=r.url; a.target='_blank'; a.rel='noopener';
    const info=document.createElement('div'); info.className='gh-info';
    const nm=document.createElement('div'); nm.className='gh-name'; nm.textContent=r.name;
    const dc=document.createElement('div'); dc.className='gh-desc'; dc.textContent=r.desc;
    const st=document.createElement('span'); st.className='gh-st'; st.textContent='★ '+(r.stars>=1000?(r.stars/1000).toFixed(1)+'k':r.stars);
    info.append(nm,dc); a.innerHTML='<span style="font-size:14px">📦</span>'; a.append(info,st); wrap.append(a);
  });
  bub.append(wrap); row.append(ava,bub); chat.append(row); chat.scrollTop=chat.scrollHeight;
}

function addCodeMsg(name, lang, code, id) {
  CS.set(id, code);
  const chat=document.getElementById('chat');
  const row=document.createElement('div'); row.className='msg ai';
  const ava=document.createElement('div'); ava.className='ava'; ava.textContent='KAI';
  const bub=document.createElement('div'); bub.className='bub';
  // header
  const hdr=document.createElement('div'); hdr.style.marginBottom='8px';
  hdr.innerHTML=`<span style="color:var(--green)">✅</span> <strong>${esc(name)}</strong> を生成しました`;
  // code wrap
  const cw=document.createElement('div'); cw.className='code-wrap';
  const ch=document.createElement('div'); ch.className='code-head';
  const lbl=document.createElement('span'); lbl.className='code-lbl '+lang; lbl.textContent=LL[lang]||lang;
  const acts=document.createElement('div'); acts.className='code-btns';
  const bCopy=document.createElement('button'); bCopy.className='cbtn'; bCopy.textContent='コピー';
  bCopy.onclick=()=>doCopy(id,bCopy);
  acts.append(bCopy);
  if (lang==='html'||lang==='pyscript') {
    const bPv=document.createElement('button'); bPv.className='cbtn pv'; bPv.textContent='▶ プレビュー';
    bPv.onclick=()=>openPV(id); acts.append(bPv);
  }
  const bDl=document.createElement('button'); bDl.className='cbtn dl'; bDl.textContent='保存';
  bDl.onclick=()=>doDl(id,name,lang); acts.append(bDl);
  ch.append(lbl,acts);
  // textarea for code — CSS-safe
  const ta=document.createElement('textarea'); ta.className='code-ta'; ta.readOnly=true;
  const lines=code.split('\n').length;
  ta.rows=Math.min(lines,18);
  ta.textContent=code.length>900?code.slice(0,900)+'\n…(省略)':code;
  cw.append(ch,ta);
  // fb
  const fb=document.createElement('div'); fb.className='fb-row';
  const fl=document.createElement('span'); fl.className='fb-l'; fl.textContent='役に立ちましたか？';
  const fg=document.createElement('button'); fg.className='fb-btn g'; fg.textContent='👍';
  fg.onclick=()=>doFb(fb,id,true);
  const fb2=document.createElement('button'); fb2.className='fb-btn b'; fb2.textContent='👎';
  fb2.onclick=()=>doFb(fb,id,false);
  fb.append(fl,fg,fb2);
  bub.append(hdr,cw,fb); row.append(ava,bub); chat.append(row); chat.scrollTop=chat.scrollHeight;
}

function doCopy(id,btn){
  const code=CS.get(id); if(!code)return;
  navigator.clipboard.writeText(code).then(()=>{const o=btn.textContent;btn.textContent='✓ コピー済み';btn.style.color='var(--green)';setTimeout(()=>{btn.textContent=o;btn.style.color=''},2000);}).catch(()=>alert('コピー失敗'));
}
function doDl(id,name,lang){
  const code=CS.get(id); if(!code)return;
  const ext=LE[lang]||'txt'; const safe=name.replace(/[^\w\-]/g,'_');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([code],{type:'text/plain'})); a.download=safe+'.'+ext; a.click();
}
function openPV(id){const code=CS.get(id);if(!code)return;document.getElementById('pv-frame').srcdoc=code;document.getElementById('pv-modal').classList.add('on')}
function closePV(){document.getElementById('pv-modal').classList.remove('on');document.getElementById('pv-frame').srcdoc=''}
function doFb(row,id,good){rateItem(id,good);row.innerHTML=good?'<span style="color:var(--green);font-size:13px">👍 ありがとう！次に活かします。</span>':'<span style="color:var(--pink);font-size:13px">👎 了解！「教える」で改善版を登録できます。</span>'}

function setThinking(on){const b=document.getElementById('thinking-badge');b.textContent=on?'THINKING':'IDLE';b.className=on?'on':''}

// ── SIDEBAR ──
function toggleSb(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('closed',!sbOpen)}
function showTab(n,btn){document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.spanel').forEach(p=>p.classList.remove('on'));btn.classList.add('on');document.getElementById('sp-'+n).classList.add('on')}

const QUICK=[
  {kw:['ボタン','button'],lang:'html',label:'ボタン集'},
  {kw:['ログイン','login'],lang:'html',label:'ログインフォーム'},
  {kw:['タイマー','timer'],lang:'html',label:'タイマー'},
  {kw:['電卓','calculator'],lang:'html',label:'電卓'},
  {kw:['todo','タスク'],lang:'html',label:'Todoアプリ'},
  {kw:['dashboard','ダッシュボード'],lang:'html',label:'ダッシュボード'},
  {kw:['flask','api'],lang:'python',label:'Flask API'},
  {kw:['pyscript'],lang:'pyscript',label:'PyScriptアプリ'},
];

function renderTmpl(){
  const el=document.getElementById('sp-tmpl'); el.innerHTML='';
  QUICK.forEach(t=>{
    const d=document.createElement('div'); d.className='scard';
    d.innerHTML=`<div class="sc-n">${t.label}</div><div class="sc-l">${LL[t.lang]||t.lang}</div><div class="sc-k">${t.kw.join(' / ')}</div>`;
    d.onclick=()=>{document.getElementById('inp').value=t.kw[0]+'を作って';doSend()};
    el.append(d);
  });
}
function renderMem(){
  const el=document.getElementById('sp-mem'); el.innerHTML='';
  const m=loadMem();
  if(!m.learned.length){const d=document.createElement('div');d.className='s-empty';d.textContent='まだ学習していません。\n「教える」か生成後に自動追加。';el.append(d);return}
  m.learned.forEach(p=>{
    const d=document.createElement('div'); d.className='scard';
    d.innerHTML=`<button class="sc-del" onclick="delLearned('${p.id}');event.stopPropagation()">×</button><div class="sc-n">${esc(p.name)}</div><div class="sc-l">${LL[p.language]||p.language}</div><div class="sc-k">${(p.keywords||[]).slice(0,4).join(' / ')}</div><div class="sc-s">${p.uses}回 · ${p.added}</div>`;
    d.onclick=()=>{document.getElementById('inp').value=(p.keywords[0]||p.name)+'を作って';document.getElementById('inp').focus()};
    el.append(d);
  });
}
function renderAPI(){
  const el=document.getElementById('sp-api'); el.innerHTML='';
  [
    {title:'window.KaiAI（同一ページ）',code:`const r = await window.KaiAI.generate({\n  topic: 'ログインフォーム'\n  // language 省略→自動判定\n});\nconsole.log(r.code);`},
    {title:'PostMessage（iframe/外部）',code:`iframe.contentWindow.postMessage({\n  type: 'KAI_REQUEST',\n  action: 'generate',\n  payload: { topic: 'タイマー' },\n  id: '001'\n}, '*');\nwindow.addEventListener('message', e => {\n  if(e.data.type==='KAI_RESPONSE')\n    console.log(e.data.result);\n});`},
    {title:'メソッド一覧',code:`KaiAI.generate(options)  // コード生成\nKaiAI.learn(pattern)     // パターン追加\nKaiAI.infer(text)        // 言語推論のみ\nKaiAI.stats()            // 統計`},
  ].forEach((s,i)=>{
    const t=document.createElement('div');t.className='api-ttl';t.textContent=s.title;
    const c=document.createElement('pre');c.className='api-blk';c.textContent=s.code;
    const b=document.createElement('button');b.className='copy-api';b.textContent='コピー';
    b.onclick=()=>navigator.clipboard.writeText(s.code).then(()=>{b.textContent='✓';setTimeout(()=>b.textContent='コピー',2000)});
    el.append(t,c,b);
  });
  const n=document.createElement('div');n.className='api-note';n.innerHTML='languageを省略すると<strong>自動推論</strong>します。';el.append(n);
}

// ── MODALS ──
function openTC(){document.getElementById('tc-modal').classList.add('on')}
function closeTC(){document.getElementById('tc-modal').classList.remove('on')}
function saveTC(){
  const kw=document.getElementById('tk').value.trim();
  const name=document.getElementById('tn').value.trim();
  const lang=document.getElementById('tl').value;
  const code=document.getElementById('tc').value.trim();
  if(!kw||!name||!code){alert('キーワード・名前・コードは必須');return}
  const keywords=kw.split(',').map(s=>s.trim()).filter(Boolean);
  const realLang=lang==='auto'?(inferLanguage(code+' '+name).lang):lang;
  addLearned(keywords,name,realLang,code);
  closeTC();
  const w=document.getElementById('welcome');if(w)w.remove();
  addAI(`📚 **「${name}」**を学習しました！\nキーワード: ${keywords.slice(0,4).join(', ')}\n自動判定言語: ${LL[realLang]||realLang}\n\n次回「${keywords[0]}」と言えばこのコードを使います。`,[]);
  ['tk','tn','tc'].forEach(i=>document.getElementById(i).value='');
}
function resetSess(){SESSION.messages=[];SESSION.topic='';SESSION.lang='';SESSION.features=[];SESSION.style='';SESSION.turnCount=0;SESSION.codeGenerated=false;setThinking(false);addAI('↺ リセットしました。新しい話題を始めてください！',['コードを作って','雑談する','使い方を教えて'])}

// ── EXTERNAL API ──
window.KaiAI={
  version:VER,
  generate:(opt={})=>{
    const p={topic:opt.topic||'App',features:opt.features?[opt.features]:[],style:opt.style||''};
    const infer=opt.language?{lang:opt.language}:inferLanguage(p.topic+' '+p.features.join(' '));
    p.lang=infer.lang||'html';
    return Promise.resolve(codeGen(p));
  },
  learn:(p={})=>{if(!p.keywords||!p.name||!p.code)return{ok:false};addLearned(p.keywords,p.name,p.language||'html',p.code);return{ok:true}},
  infer:(text)=>inferLanguage(text),
  getTemplates:()=>QUICK.map(t=>({id:t.kw[0],name:t.label,keywords:t.kw,language:t.lang})),
  stats:()=>{const m=loadMem();return{learned:m.learned.length,scores:m.scores}},
};
window.addEventListener('message',async e=>{
  if(!e.data||e.data.type!=='KAI_REQUEST')return;
  const{action,payload,id}=e.data;
  try{const fn=window.KaiAI[action];if(typeof fn!=='function')throw new Error('Unknown: '+action);const result=await fn(payload||{});e.source?.postMessage({type:'KAI_RESPONSE',id,result,ok:true},e.origin||'*');}
  catch(err){e.source?.postMessage({type:'KAI_RESPONSE',id,error:err.message,ok:false},e.origin||'*');}
});

// ── INPUT EVENTS ──
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}});
document.getElementById('inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
['pv-modal','tc-modal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this){this.classList.remove('on');if(id==='pv-modal')document.getElementById('pv-frame').srcdoc=''}})});

// ── INIT ──
(function init(){
  const chips=['ログインフォームを作って','Pythonスクリプト','Todoアプリ','ダッシュボード','こんにちは！','使い方を教えて','面白いもの作って'];

  chips.forEach(c=>{const b=document.createElement('button');b.className='w-chip';b.textContent=c;b.onclick=()=>{document.getElementById('inp').value=c;doSend()};el.append(b)});
  renderTmpl(); renderMem(); renderAPI();
  console.log(`%cカイ AI v${VER} 起動`,'color:#4f8ef7;font-weight:700;font-size:14px');
  console.log('%c言語推論エンジン搭載 — window.KaiAI.infer("テキスト") で確認できます','color:#22d68a');
})();
</script>
