<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カイ AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=M+PLUS+1+Code:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #070910;
  --s1:       #0d0f18;
  --s2:       #131625;
  --border:   #1e2235;
  --accent:   #3b82f6;
  --accent2:  #06d6a0;
  --accent3:  #f72585;
  --warn:     #ffd166;
  --text:     #cdd6f4;
  --dim:      #585b70;
  --code-bg:  #080a12;
  --r:        10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  display:flex;
  flex-direction:column;
}
/* scanline overlay */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  pointer-events:none;z-index:9999;
}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--s1);
  position:relative;z-index:100;
  flex-shrink:0;
}
.logo{
  font-family:'JetBrains Mono',monospace;
  font-size:22px;font-weight:700;
  color:var(--accent2);
  text-shadow:0 0 16px rgba(6,214,160,.5);
  letter-spacing:2px;
}
.logo em{color:var(--accent3);font-style:normal;}
.ver{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px;}
.hbtns{display:flex;gap:8px;margin-left:auto;}
.hbtn{
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;color:var(--dim);
  font-family:'Noto Sans JP',sans-serif;font-size:12px;
  cursor:pointer;transition:all .2s;
}
.hbtn:hover{border-color:var(--accent);color:var(--accent);}
.hbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
#stat-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent2);
  box-shadow:0 0 8px var(--accent2);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:260px;flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--s1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);}
.stab{
  flex:1;padding:10px;text-align:center;
  font-size:11px;letter-spacing:1px;
  color:var(--dim);cursor:pointer;
  border:none;background:none;
  border-bottom:2px solid transparent;
  transition:all .2s;font-family:'Noto Sans JP',sans-serif;
}
.stab.active{color:var(--accent2);border-bottom-color:var(--accent2);}
.spanel{display:none;flex:1;overflow-y:auto;padding:12px;}
.spanel.active{display:flex;flex-direction:column;gap:8px;}

/* template list */
.tmpl-item{
  padding:10px 12px;border-radius:8px;
  border:1px solid var(--border);
  background:var(--s2);cursor:pointer;
  transition:all .2s;
}
.tmpl-item:hover{border-color:var(--accent);background:rgba(59,130,246,.08);}
.tmpl-name{font-size:13px;font-weight:500;}
.tmpl-kw{font-size:10px;color:var(--dim);margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* memory list */
.mem-item{
  padding:10px 12px;border-radius:8px;
  border:1px solid var(--border);
  background:var(--s2);
  position:relative;
}
.mem-name{font-size:12px;font-weight:500;color:var(--accent2);}
.mem-kw{font-size:10px;color:var(--dim);margin-top:2px;}
.mem-del{
  position:absolute;top:8px;right:8px;
  background:none;border:none;color:var(--dim);
  cursor:pointer;font-size:14px;
  transition:color .2s;
}
.mem-del:hover{color:var(--accent3);}
.mem-score{font-size:10px;color:var(--warn);margin-top:4px;}
.empty-msg{color:var(--dim);font-size:12px;text-align:center;padding:20px 0;}

/* ── CHAT AREA ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#chat{
  flex:1;overflow-y:auto;
  padding:20px;
  display:flex;flex-direction:column;gap:16px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg{display:flex;gap:10px;animation:fadeUp .3s ease forwards;opacity:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:80%;}
.msg.ai{align-self:flex-start;max-width:94%;}
.ava{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  flex-shrink:0;
}
.msg.user .ava{background:var(--accent2);color:#000;}
.msg.ai .ava{
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  color:#fff;letter-spacing:.5px;
}
.bubble{
  padding:12px 16px;border-radius:12px;
  font-size:14px;line-height:1.75;
}
.msg.user .bubble{
  background:var(--accent2);color:#000;
  border-bottom-right-radius:3px;font-weight:500;
}
.msg.ai .bubble{
  background:var(--s2);border:1px solid var(--border);
  border-bottom-left-radius:3px;
}

/* code block */
.code-block{
  background:var(--code-bg);
  border:1px solid var(--border);
  border-radius:8px;
  margin:10px 0;
  overflow:hidden;
}
.code-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;
  background:rgba(255,255,255,.03);
  border-bottom:1px solid var(--border);
}
.code-lang{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--accent2);letter-spacing:1px;
}
.code-actions{display:flex;gap:6px;}
.cbtn{
  padding:3px 10px;border-radius:4px;
  border:1px solid var(--border);
  background:transparent;color:var(--dim);
  font-size:11px;cursor:pointer;
  transition:all .2s;font-family:'Noto Sans JP',sans-serif;
}
.cbtn:hover{border-color:var(--accent);color:var(--accent);}
.cbtn.preview-btn:hover{border-color:var(--accent2);color:var(--accent2);}
pre{
  padding:14px;
  overflow-x:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;line-height:1.6;
  color:var(--text);
  max-height:320px;
  overflow-y:auto;
}
pre::-webkit-scrollbar{width:4px;height:4px;}
pre::-webkit-scrollbar-thumb{background:var(--border);}

/* feedback bar */
.fb-bar{
  display:flex;align-items:center;gap:8px;
  margin-top:10px;padding-top:8px;
  border-top:1px solid var(--border);
}
.fb-label{font-size:11px;color:var(--dim);}
.fb-btn{
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  font-size:12px;cursor:pointer;
  transition:all .2s;
}
.fb-btn.good:hover{background:rgba(6,214,160,.15);border-color:var(--accent2);}
.fb-btn.bad:hover{background:rgba(247,37,133,.15);border-color:var(--accent3);}

/* teach form in message */
.teach-inline{
  margin-top:12px;padding:12px;
  background:var(--code-bg);
  border:1px solid var(--border);border-radius:8px;
}
.teach-inline label{font-size:11px;color:var(--dim);display:block;margin-bottom:4px;}
.teach-inline input,.teach-inline textarea{
  width:100%;padding:6px 10px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
  outline:none;transition:border .2s;
  resize:vertical;
}
.teach-inline textarea{height:80px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.teach-inline input:focus,.teach-inline textarea:focus{border-color:var(--accent);}
.teach-inline .row{display:flex;gap:8px;margin-top:8px;}
.ti-btn{
  padding:6px 14px;border-radius:6px;
  border:none;font-size:13px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  transition:all .2s;
}
.ti-btn.save{background:var(--accent);color:#fff;}
.ti-btn.save:hover{background:#2563eb;}
.ti-btn.cancel{background:var(--border);color:var(--dim);}
.ti-btn.cancel:hover{color:var(--text);}

/* ── INPUT ── */
.input-wrap{
  padding:16px 20px;
  border-top:1px solid var(--border);
  background:var(--s1);
  flex-shrink:0;
}
.input-row{
  display:flex;gap:10px;align-items:flex-end;
  background:var(--s2);
  border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;
  transition:border .2s;
}
.input-row:focus-within{border-color:var(--accent);}
#inp{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Noto Sans JP',sans-serif;
  font-size:14px;resize:none;max-height:140px;line-height:1.6;
}
#inp::placeholder{color:var(--dim);}
#send{
  width:38px;height:38px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;
  cursor:pointer;font-size:16px;flex-shrink:0;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
#send:hover{background:#2563eb;transform:scale(1.05);}
#send:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── WELCOME ── */
.welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;padding:40px;text-align:center;
}
.w-icon{
  font-family:'JetBrains Mono',monospace;
  font-size:52px;color:var(--accent2);
  text-shadow:0 0 30px rgba(6,214,160,.5);
  animation:icon-glow 3s ease-in-out infinite;
}
@keyframes icon-glow{
  0%,100%{text-shadow:0 0 20px rgba(6,214,160,.4);}
  50%{text-shadow:0 0 40px rgba(6,214,160,.9),0 0 80px rgba(6,214,160,.2);}
}
.w-title{font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:3px;}
.w-sub{color:var(--dim);font-size:13px;line-height:1.8;max-width:360px;}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px;}
.sug{
  padding:7px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--s2);
  color:var(--dim);font-size:12px;cursor:pointer;
  transition:all .2s;
}
.sug:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(6,214,160,.06);}

/* ── PREVIEW MODAL ── */
#preview-modal{
  display:none;
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:1000;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
#preview-modal.open{display:flex;}
.pm-inner{
  width:92vw;height:88vh;
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);
  display:flex;flex-direction:column;overflow:hidden;
  animation:modal-in .2s ease;
}
@keyframes modal-in{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.pm-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.pm-title{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent2);}
.pm-close{
  background:none;border:none;color:var(--dim);
  font-size:20px;cursor:pointer;transition:color .2s;line-height:1;
}
.pm-close:hover{color:var(--accent3);}
#preview-frame{flex:1;border:none;background:#fff;}

/* ── TEACH MODAL ── */
#teach-modal{
  display:none;
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:1000;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
#teach-modal.open{display:flex;}
.tm-inner{
  width:500px;max-width:95vw;
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  animation:modal-in .2s ease;
}
.tm-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);
  background:rgba(6,214,160,.05);
}
.tm-title{
  font-family:'JetBrains Mono',monospace;
  font-size:14px;color:var(--accent2);
}
.tm-body{padding:18px;display:flex;flex-direction:column;gap:12px;}
.tm-body label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px;}
.tm-body input,.tm-body textarea{
  width:100%;padding:8px 12px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
  outline:none;transition:border .2s;
}
.tm-body textarea{
  height:160px;resize:vertical;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  line-height:1.6;
}
.tm-body input:focus,.tm-body textarea:focus{border-color:var(--accent2);}
.tm-hint{font-size:11px;color:var(--dim);line-height:1.6;}
.tm-actions{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border);}
.tm-btn{
  padding:8px 20px;border-radius:8px;border:none;
  font-size:13px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s;
}
.tm-btn.save{background:var(--accent2);color:#000;font-weight:700;}
.tm-btn.save:hover{background:#04c48f;}
.tm-btn.cancel{background:var(--border);color:var(--dim);}
.tm-btn.cancel:hover{color:var(--text);}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">カイ<em>AI</em></div>
  <div class="ver">v2.0 LOCAL</div>
  <div id="stat-dot"></div>
  <div class="hbtns">
    <button class="hbtn" onclick="openTeach()">＋ 教える</button>
    <button class="hbtn active" id="sidebar-toggle" onclick="toggleSidebar()">サイドバー</button>
  </div>
</header>

<!-- ── MAIN ── -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" onclick="switchSTab('templates',this)">テンプレ</button>
      <button class="stab" onclick="switchSTab('memory',this)">メモリ</button>
    </div>
    <div class="spanel active" id="stab-templates"></div>
    <div class="spanel" id="stab-memory"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-wrap">
    <div id="chat">
      <div class="welcome" id="welcome">
        <div class="w-icon">⬡</div>
        <div class="w-title">KAI AI SYSTEM</div>
        <div class="w-sub">HTML/CSS/JavaScript のコードを生成します。<br>何でも日本語で話しかけてください。<br>使うほど賢くなります。</div>
        <div class="suggestions" id="sugs"></div>
      </div>
    </div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea id="inp" rows="1" placeholder="例: ボタンを作って / ログインフォームが欲しい / タイマー / Todo" oninput="resize(this)" onkeydown="onKey(event)"></textarea>
        <button id="send" onclick="send()">▶</button>
      </div>
    </div>
  </div>
</div>

<!-- PREVIEW MODAL -->
<div id="preview-modal">
  <div class="pm-inner">
    <div class="pm-header">
      <span class="pm-title">// LIVE PREVIEW</span>
      <button class="pm-close" onclick="closePreview()">✕</button>
    </div>
    <iframe id="preview-frame"></iframe>
  </div>
</div>

<!-- TEACH MODAL -->
<div id="teach-modal">
  <div class="tm-inner">
    <div class="tm-header">
      <span class="tm-title">// 新しいパターンを教える</span>
      <button class="pm-close" onclick="closeTeach()">✕</button>
    </div>
    <div class="tm-body">
      <div>
        <label>キーワード（カンマ区切り）</label>
        <input id="t-kw" placeholder="例: ぐるぐる, くるくる, スピン">
      </div>
      <div>
        <label>名前</label>
        <input id="t-name" placeholder="例: 回転アニメーション">
      </div>
      <div>
        <label>HTML/CSS/JSコード（完全なHTMLページを推奨）</label>
        <textarea id="t-code" placeholder="<!DOCTYPE html>&#10;<html>&#10;...&#10;</html>"></textarea>
      </div>
      <div class="tm-hint">
        ⚡ キーワードを入力するとこのコードを生成します<br>
        📚 次回からカイはこのパターンを覚えて使います
      </div>
    </div>
    <div class="tm-actions">
      <button class="tm-btn cancel" onclick="closeTeach()">キャンセル</button>
      <button class="tm-btn save" onclick="saveTeach()">保存して教える</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// MEMORY ENGINE (localStorage)
// ═══════════════════════════════════════════
const MEM_KEY = 'kai_ai_memory_v2';

function loadMem() {
  try { return JSON.parse(localStorage.getItem(MEM_KEY)) || initMem(); }
  catch { return initMem(); }
}
function initMem() {
  return { learned:[], scores:{}, aliases:{}, corrections:{} };
}
function saveMem(m) {
  localStorage.setItem(MEM_KEY, JSON.stringify(m));
}
function addLearned(keywords, name, code) {
  const m = loadMem();
  const id = 'custom_' + Date.now();
  m.learned.push({ id, keywords, name, code, addedAt: new Date().toLocaleDateString('ja'), uses:0 });
  saveMem(m);
  renderMemory();
}
function delLearned(id) {
  const m = loadMem();
  m.learned = m.learned.filter(x => x.id !== id);
  saveMem(m);
  renderMemory();
}
function rateTemplate(id, positive) {
  const m = loadMem();
  if (!m.scores[id]) m.scores[id] = { good:0, bad:0 };
  positive ? m.scores[id].good++ : m.scores[id].bad++;
  saveMem(m);
}
function getScore(id) {
  const m = loadMem();
  const s = m.scores[id];
  if (!s) return null;
  const total = s.good + s.bad;
  if (!total) return null;
  return Math.round(s.good / total * 100);
}

// ═══════════════════════════════════════════
// TEMPLATES
// ═══════════════════════════════════════════
const TEMPLATES = [
  {
    id:'button',
    name:'ボタン集',
    keywords:['ボタン','button','btn','クリック','ぼたん','ボタンを作','ボタンが欲しい'],
    generate:()=>`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
body{display:flex;flex-wrap:wrap;gap:16px;padding:50px;background:#0f0f1a;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;}
.btn{padding:13px 30px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;letter-spacing:.5px;}
.btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,.25);border-radius:50%;transform:translate(-50%,-50%);transition:width .5s,height .5s;}
.btn:hover::after{width:300px;height:300px;}
.btn:active{transform:scale(.97);}
.primary{background:#3b82f6;color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.4);}
.primary:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(59,130,246,.6);}
.success{background:#06d6a0;color:#000;box-shadow:0 4px 15px rgba(6,214,160,.4);}
.success:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(6,214,160,.6);}
.danger{background:#f72585;color:#fff;box-shadow:0 4px 15px rgba(247,37,133,.4);}
.danger:hover{transform:translateY(-3px);}
.ghost{background:transparent;color:#3b82f6;border:2px solid #3b82f6;}
.ghost:hover{background:#3b82f6;color:#fff;transform:translateY(-3px);}
.gradient{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;animation:glow 2s infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(102,126,234,.5);}50%{box-shadow:0 0 25px rgba(102,126,234,.9);}}
.flat{background:#1e293b;color:#94a3b8;border:1px solid #334155;}
.flat:hover{background:#334155;color:#f1f5f9;}
</style></head><body>
<button class="btn primary">プライマリ</button>
<button class="btn success">サクセス</button>
<button class="btn danger">デンジャー</button>
<button class="btn ghost">ゴースト</button>
<button class="btn gradient">グラデーション</button>
<button class="btn flat">フラット</button>
</body></html>`
  },
  {

    const memScore = getScore(t.id);
    if (memScore !== null) score *= (0.5 + memScore / 100);
    if (score > bestScore) { bestScore = score; best = t; }
  }
  if (bestScore > 0) return { type:'builtin', item:best };
  return null;
}

function extractIntent(input) {
  // Try to understand additional context
  const hints = [];
  if (/ダーク|dark|黒/i.test(input)) hints.push('dark');
  if (/シンプル|simple|シンプルな/i.test(input)) hints.push('simple');
  if (/かわいい|cute|ピンク/i.test(input)) hints.push('cute');
  return hints;
}

// ═══════════════════════════════════════════
// RESPONSE GENERATOR
// ═══════════════════════════════════════════
const GREETINGS = ['こんにちは！何か作りましょうか？','やあ！どんなコードが必要ですか？','お待ちしてました。何を作りますか？'];
const UNKNOWNS = [
  'うーん...そのパターンはまだ知らないです。「教える」ボタンから教えてもらえますか？📚',
  'ごめんなさい、対応するテンプレートが見つかりません。別の言い方で試してみてください。',
  'そのキーワードは未知です。サイドバーの「テンプレ」から選ぶか、教えてください！',
];

function respond(input) {
  const lower = input.trim().toLowerCase();

  // Greeting check
  if (/^(こんにちは|hello|hi|やあ|どうも|おはよう|お願い|よろしく)/.test(lower)) {
    return { type:'text', text: GREETINGS[Math.floor(Math.random()*GREETINGS.length)] };
  }
  // Help check
  if (/(help|ヘルプ|使い方|何ができ|できること)/.test(lower)) {
    return { type:'text', text:`カイAIにできること：\n\n📌 **コード生成** — ボタン・フォーム・ゲームなど${TEMPLATES.length}種類以上\n📚 **学習** — 「教える」から新しいパターンを登録\n⭐ **フィードバック** — 👍/👎で好みを学習\n👁 **プレビュー** — 生成コードをその場で確認\n\n「ログインフォームを作って」「電卓が欲しい」など自由に話しかけてください！` };
  }
  // Memory check
  if (/(覚えた|学習|何を知ってる|記憶)/.test(lower)) {
    const m = loadMem();
    const cnt = m.learned.length;
    const scores = Object.entries(m.scores).filter(([,v])=>v.good+v.bad>0);
    let txt = `現在の記憶状況：\n\n✅ 学習済みパターン: **${cnt}件**\n⭐ 評価データ: **${scores.length}件**\n\n`;
    if (cnt > 0) txt += '学習済み: ' + m.learned.map(x=>x.name).join(', ');
    else txt += 'まだ新しいパターンは学習していません。「教える」から登録できます！';
    return { type:'text', text:txt };
  }

  // Template matching
  const match = matchTemplate(input);
  if (match) {
    if (match.type === 'learned') {
      const item = match.item;
      // increment use count
      const m = loadMem();
      const idx = m.learned.findIndex(x=>x.id===item.id);
      if (idx>=0) { m.learned[idx].uses++; saveMem(m); }
      return { type:'code', templateId: item.id, name: item.name, code: item.code, learned: true };
    } else {
      const t = match.item;
      return { type:'code', templateId: t.id, name: t.name, code: t.generate() };
    }
  }

  return { type:'text', text: UNKNOWNS[Math.floor(Math.random()*UNKNOWNS.length)] };
}

// ═══════════════════════════════════════════
// UI ENGINE
// ═══════════════════════════════════════════
let thinking = false;

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function send() {
  if (thinking) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  addMsg('user', text);
  thinking = true;
  document.getElementById('send').disabled = true;
  // Simulate "thinking"
  const delay = 400 + Math.random() * 600;
  setTimeout(() => {
    const res = respond(text);
    if (res.type === 'text') {
      addMsg('ai', res.text);
    } else {
      addCodeMsg(res);
    }
    thinking = false;
    document.getElementById('send').disabled = false;
    document.getElementById('inp').focus();
  }, delay);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatText(t) {
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\n/g,'<br>');
  return t;
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `<div class="ava">${role==='user'?'YOU':'KAI'}</div>
    <div class="bubble">${role==='ai'?formatText(text):escHtml(text)}</div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addCodeMsg(res) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  const previewId = 'code_' + Date.now();
  const learnBadge = res.learned ? ' <span style="font-size:10px;background:rgba(6,214,160,.15);color:#06d6a0;padding:2px 8px;border-radius:10px;border:1px solid rgba(6,214,160,.3)">学習済み</span>' : '';
  const short = res.code.length > 600 ? res.code.substring(0,600)+'...' : res.code;
  msg.innerHTML = `<div class="ava">KAI</div>
  <div class="bubble">
    <div>✅ <strong>${escHtml(res.name)}</strong>${learnBadge} を生成しました</div>
    <div class="code-block" style="margin-top:10px">
      <div class="code-header">
        <span class="code-lang">HTML</span>
        <div class="code-actions">
          <button class="cbtn" onclick="copyCode('${previewId}')">コピー</button>
          <button class="cbtn preview-btn" onclick="previewCode('${previewId}')">▶ プレビュー</button>
        </div>
      </div>
      <pre id="${previewId}" data-full="${encodeURIComponent(res.code)}">${escHtml(short)}</pre>
    </div>
    <div class="fb-bar">
      <span class="fb-label">このコードは役立ちましたか？</span>
      <button class="fb-btn good" onclick="feedback(this,'${res.templateId}',true)">👍</button>
      <button class="fb-btn bad" onclick="feedback(this,'${res.templateId}',false)">👎</button>
    </div>
  </div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function copyCode(id) {
  const el = document.getElementById(id);
  const full = decodeURIComponent(el.dataset.full || el.textContent);
  navigator.clipboard.writeText(full).then(() => {
    const btn = el.closest('.code-block').querySelector('.cbtn');
    btn.textContent = '✓ コピー済み';
    btn.style.color = 'var(--accent2)';
    setTimeout(() => { btn.textContent = 'コピー'; btn.style.color = ''; }, 2000);
  });
}

function previewCode(id) {
  const el = document.getElementById(id);
  const full = decodeURIComponent(el.dataset.full || el.textContent);
  const frame = document.getElementById('preview-frame');
  frame.srcdoc = full;
  document.getElementById('preview-modal').classList.add('open');
}
function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
  document.getElementById('preview-frame').srcdoc = '';
}

function feedback(btn, templateId, positive) {
  rateTemplate(templateId, positive);
  const bar = btn.closest('.fb-bar');
  bar.innerHTML = positive
    ? '<span style="color:var(--accent2);font-size:13px">👍 ありがとう！より良いコードを出せるよう学習します。</span>'
    : '<span style="color:var(--accent3);font-size:13px">👎 了解です。「教える」機能で改善を教えてください！</span>';
  renderMemory();
}

// ═══════════════════════════════════════════
// TEACH MODAL
// ═══════════════════════════════════════════
function openTeach() {
  document.getElementById('t-kw').value = '';
  document.getElementById('t-name').value = '';
  document.getElementById('t-code').value = '';
  document.getElementById('teach-modal').classList.add('open');
}
function closeTeach() { document.getElementById('teach-modal').classList.remove('open'); }
function saveTeach() {
  const kwRaw = document.getElementById('t-kw').value.trim();
  const name = document.getElementById('t-name').value.trim();
  const code = document.getElementById('t-code').value.trim();
  if (!kwRaw || !name || !code) { alert('すべての項目を入力してください'); return; }
  const keywords = kwRaw.split(',').map(s=>s.trim()).filter(Boolean);
  addLearned(keywords, name, code);
  closeTeach();
  // Confirm in chat
  const chat = document.getElementById('chat');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  addMsg('ai', `📚 「${name}」を学習しました！\nキーワード: ${keywords.join(', ')}\n\n今後「${keywords[0]}」と言えばこのコードを生成します。`);
  chat.scrollTop = chat.scrollHeight;
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function switchSTab(name, btn) {
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.spanel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('stab-'+name).classList.add('active');
}

function renderTemplates() {
  const el = document.getElementById('stab-templates');
  el.innerHTML = TEMPLATES.map(t => {
    const sc = getScore(t.id);
    const stars = sc !== null ? `<span style="color:var(--warn);font-size:10px">★ ${sc}%</span>` : '';
    return `<div class="tmpl-item" onclick="document.getElementById('inp').value='${t.keywords[0]}を作って';document.getElementById('inp').focus()">
      <div class="tmpl-name">${t.name} ${stars}</div>
      <div class="tmpl-kw">${t.keywords.slice(0,3).join(' / ')}</div>
    </div>`;
  }).join('');
}

function renderMemory() {
  const el = document.getElementById('stab-memory');
  const m = loadMem();
  const learned = m.learned;
  const scores = Object.entries(m.scores).filter(([,v])=>v.good+v.bad>0);
  let html = '';
  if (learned.length === 0 && scores.length === 0) {
    html = '<div class="empty-msg">まだ何も学習していません。<br>「教える」か、コードを評価すると記憶が増えます！</div>';
  }
  if (learned.length > 0) {
    html += `<div style="font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">学習済みパターン</div>`;
    html += learned.map(p=>`<div class="mem-item">
      <div class="mem-name">${p.name}</div>
      <div class="mem-kw">${p.keywords.join(' / ')}</div>
      <div class="mem-score">使用${p.uses}回 · ${p.addedAt}</div>
      <button class="mem-del" onclick="delLearned('${p.id}')" title="削除">×</button>
    </div>`).join('');
  }
  if (scores.length > 0) {
    html += `<div style="font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px">評価データ</div>`;
    html += scores.map(([id, v]) => {
      const t = TEMPLATES.find(x=>x.id===id);
      const name = t ? t.name : id;
      const sc = Math.round(v.good/(v.good+v.bad)*100);
      return `<div class="mem-item">
        <div class="mem-name">${name}</div>
        <div class="mem-score">👍 ${v.good} / 👎 ${v.bad} = ${sc}%</div>
      </div>`;
    }).join('');
  }
  el.innerHTML = html;
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  if (sb.style.display === 'none') {
    sb.style.display = '';
    btn.classList.add('active');
  } else {
    sb.style.display = 'none';
    btn.classList.remove('active');
  }
}

// ═══════════════════════════════════════════
// SUGGESTIONS
// ═══════════════════════════════════════════
const SUGGESTIONS = ['ボタンを作って','ログインフォーム','電卓','Todoアプリ','タイマー','ランディングページ','じゃんけんゲーム','アコーディオン'];
function renderSuggestions() {
  const el = document.getElementById('sugs');
  if (!el) return;
  el.innerHTML = SUGGESTIONS.map(s=>`<button class="sug" onclick="usesugg(this)">${s}</button>`).join('');
}
function usesugg(btn) {
  document.getElementById('inp').value = btn.textContent;
  send();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderTemplates();
renderMemory();
renderSuggestions();
document.getElementById('preview-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('preview-modal')) closePreview();
});
document.getElementById('teach-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('teach-modal')) closeTeach();
});
</script>
