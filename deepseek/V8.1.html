<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Noto Sans JP', 'JetBrains Mono', monospace;
            background: #070910;
            color: #bfcfe8;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .session-panel {
            width: 280px;
            background: #0b0d18;
            border-right: 1px solid #1b2236;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1rem;
        }
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .new-session-btn {
            background: #1ed98a;
            color: #000;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .session-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .session-item {
            background: #10131e;
            border: 1px solid #1b2236;
            border-radius: 12px;
            padding: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .session-item.active {
            border-color: #4f8ef7;
            background: rgba(79, 142, 247, 0.1);
        }
        .session-name {
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }
        .session-date {
            font-size: 0.65rem;
            color: #3a506a;
        }
        .config-steps {
            margin-top: 1rem;
            border-top: 1px solid #1b2236;
            padding-top: 1rem;
        }
        .step-item {
            padding: 0.5rem;
            border-left: 2px solid #3a506a;
            margin-bottom: 0.5rem;
            font-size: 0.7rem;
        }
        .step-item.completed { border-left-color: #1ed98a; }
        .step-item.current { border-left-color: #f5c031; background: rgba(245, 192, 49, 0.05); }
        .generate-btn {
            background: #1ed98a;
            color: #000;
            width: 100%;
            padding: 0.6rem;
            border: none;
            border-radius: 40px;
            margin-top: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .generate-btn:disabled {
            background: #3a506a;
            cursor: not-allowed;
        }
        .download-btns {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .download-btns button {
            flex: 1;
            background: #1b2236;
            border: 1px solid #2d3748;
            padding: 0.4rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0c0f1a;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            max-width: 85%;
            animation: fadeIn 0.2s;
        }
        .user-message { align-self: flex-end; }
        .ai-message { align-self: flex-start; }
        .msg-bubble {
            padding: 0.6rem 1rem;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.85rem;
        }
        .user-message .msg-bubble {
            background: #4f8ef7;
            border-bottom-right-radius: 4px;
        }
        .ai-message .msg-bubble {
            background: #10131e;
            border: 1px solid #1b2236;
            border-bottom-left-radius: 4px;
        }
        .math-block {
            background: #070910;
            border-radius: 8px;
            padding: 0.6rem;
            margin-top: 0.4rem;
            font-family: monospace;
            font-size: 0.8rem;
            border-left: 3px solid #1ed98a;
        }
        .math-step {
            color: #8b9dc3;
            font-size: 0.7rem;
            margin-top: 0.2rem;
        }
        .math-result {
            color: #1ed98a;
            font-weight: bold;
            margin-top: 0.3rem;
        }
        .input-area {
            padding: 1rem;
            background: #0b0d18;
            border-top: 1px solid #1b2236;
        }
        .input-group {
            display: flex;
            gap: 0.5rem;
        }
        textarea {
            flex: 1;
            background: #10131e;
            border: 1px solid #1b2236;
            border-radius: 24px;
            padding: 0.6rem 1rem;
            color: #bfcfe8;
            font-family: inherit;
            font-size: 0.85rem;
            resize: none;
            outline: none;
        }
        button {
            background: #4f8ef7;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .right-panel {
            width: 400px;
            background: #0b0d18;
            border-left: 1px solid #1b2236;
            display: flex;
            flex-direction: column;
        }
        .skill-section, .code-section {
            border-bottom: 1px solid #1b2236;
            padding: 0.8rem;
        }
        .skill-header {
            display: flex;
            justify-content: space-between;

        }
        .skill-list {
            max-height: 180px;

        }
        .skill-card {
            background: #10131e;
            border: 1px solid #1b2236;
            border-radius: 8px;
            padding: 0.5rem;

            justify-content: space-between;

        .skill-card.enabled { border-color: #4f8ef7; }
        .skill-name { font-size: 0.75rem; font-weight: 500; }
        .skill-toggle {
            width: 32px;
            height: 18px;
            border-radius: 20px;
            background: #3a506a;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }
        .skill-toggle.on { background: #4f8ef7; }
        .skill-toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: 0.2s;

        .skill-toggle.on::after { left: 16px; }
        .github-input {

            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        .github-input input {
            flex: 1;
            background: #10131e;
            border: 1px solid #1b2236;
            border-radius: 20px;

            font-size: 0.7rem;

        }
        .code-preview {
            flex: 1;
            overflow: auto;

        }
        .code-preview pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            white-space: pre-wrap;
        }
        .preview-frame {
            height: 150px;
            border: 1px solid #1b2236;

            background: white;
            margin-top: 0.5rem;
        }
        .preview-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .quick-replies {
            display: flex;

            gap: 0.4rem;

        }
        .qr-btn {
            background: #10131e;
            border: 1px solid #1b2236;
            padding: 0.2rem 0.6rem;

            font-size: 0.65rem;

        }
        .math-special {
            background: linear-gradient(135deg, #1a2a3a, #0f1722);
            border-radius: 12px;
            padding: 0.8rem;
            margin-top: 0.5rem;
        }
    </style>
</head>

<script>
    (function() {
        // ==================== 定数・設定 ====================
        const REQUIRED_PASSWORD = "@ppipinopi_0123";
        const STORAGE_SESSIONS = 'core_sessions_v81';
        const STORAGE_ACTIVE = 'core_active_v81';
        const STORAGE_SKILLS = 'core_skills_v81';
        
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // ==================== 高校数学エンジン (全範囲対応) ====================
        const MathEngine = {
            // 安全な数式評価
            evaluate(expr) {
                try {
                    let clean = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');
                    clean = clean.replace(/√\(?([^)]+)\)?/g, 'Math.sqrt($1)');
                    clean = clean.replace(/sin\(/g, 'Math.sin(');
                    clean = clean.replace(/cos\(/g, 'Math.cos(');
                    clean = clean.replace(/tan\(/g, 'Math.tan(');
                    clean = clean.replace(/log\(/g, 'Math.log10(');
                    clean = clean.replace(/ln\(/g, 'Math.log(');
                    clean = clean.replace(/π/g, 'Math.PI');
                    clean = clean.replace(/e(?![a-z])/g, 'Math.E');
                    const fn = new Function('Math', `return (${clean})`);
                    const result = fn(Math);
                    return typeof result === 'number' && !isNaN(result) ? result : null;
                } catch { return null; }
            },
            
            // 方程式ソルバー (ax + b = c)
            solveLinear(expr) {
                const match = expr.match(/(-?\d*\.?\d*)\s*([a-z])\s*([+\-])\s*(\d+\.?\d*)\s*=\s*(-?\d+\.?\d*)/i);
                if (match) {
                    let a = parseFloat(match[1]) || 1;
                    const op = match[3];
                    let b = parseFloat(match[4]);
                    const c = parseFloat(match[5]);
                    if (op === '-') b = -b;
                    const x = (c - b) / a;
                    return { steps: [`${a}x + ${b} = ${c}`, `${a}x = ${c - b}`, `x = ${(c - b)} / ${a}`], result: `x = ${x}` };
                }
                return null;
            },
            
            // 連立方程式 (2元1次)
            solveSystem(expr) {
                const lines = expr.split(/[\n,;]/);
                const eqs = [];
                for (let line of lines) {
                    const match = line.match(/(\d*\.?\d*)\s*([a-z])\s*([+\-])\s*(\d*\.?\d*)\s*([a-z])\s*=\s*(-?\d+\.?\d*)/i);
                    if (match) {
                        let a = parseFloat(match[1]) || (match[2] === match[4] ? 1 : 0);
                        let b = parseFloat(match[4]) || (match[5] ? 1 : 0);
                        if (match[3] === '-') b = -b;
                        const c = parseFloat(match[6]);
                        eqs.push({ a, b, c });
                    }
                }
                if (eqs.length >= 2) {
                    const { a1, b1, c1 } = eqs[0];
                    const { a2, b2, c2 } = eqs[1];
                    const det = a1 * b2 - a2 * b1;
                    if (det !== 0) {
                        const x = (c1 * b2 - c2 * b1) / det;
                        const y = (a1 * c2 - a2 * c1) / det;
                        return { steps: [`行列式 = ${det}`, `x = (${c1}×${b2} - ${c2}×${b1}) / ${det}`, `y = (${a1}×${c2} - ${a2}×${c1}) / ${det}`], result: `x = ${x}, y = ${y}` };
                    }
                }
                return null;
            },
            
            // 二次方程式
            solveQuadratic(expr) {
                const match = expr.match(/(\d*\.?\d*)x\^?2\s*([+\-])\s*(\d*\.?\d*)x\s*([+\-])\s*(\d+\.?\d*)\s*=\s*0/);
                if (match) {
                    let a = parseFloat(match[1]) || 1;
                    let b = parseFloat(match[3]) || 0;
                    let c = parseFloat(match[5]) || 0;
                    if (match[2] === '-') b = -b;
                    if (match[4] === '-') c = -c;
                    const D = b * b - 4 * a * c;
                    const steps = [`判別式 D = ${b}² - 4×${a}×${c} = ${D}`];
                    if (D > 0) {
                        const x1 = (-b + Math.sqrt(D)) / (2 * a);
                        const x2 = (-b - Math.sqrt(D)) / (2 * a);
                        return { steps, result: `x = ${x1.toFixed(4)}, ${x2.toFixed(4)}` };
                    } else if (D === 0) {
                        const x = -b / (2 * a);
                        return { steps, result: `x = ${x} (重解)` };
                    } else {
                        const re = -b / (2 * a);
                        const im = Math.sqrt(-D) / (2 * a);
                        return { steps, result: `x = ${re.toFixed(4)} ± ${im.toFixed(4)}i` };
                    }
                }
                return null;
            },
            
            // 三角関数の値
            solveTrig(value) {
                const match = value.match(/(sin|cos|tan)\((\d+\.?\d*)(°|deg|rad)?\)/i);
                if (match) {
                    let angle = parseFloat(match[2]);
                    const unit = match[3];
                    if (unit === '°' || unit === 'deg') angle = angle * Math.PI / 180;
                    let result;
                    switch (match[1].toLowerCase()) {
                        case 'sin': result = Math.sin(angle); break;
                        case 'cos': result = Math.cos(angle); break;
                        case 'tan': result = Math.tan(angle); break;
                        default: return null;
                    }
                    return { steps: [`${match[1]}(${match[2]}${unit || '°'}) を計算`], result: `= ${result.toFixed(6)}` };
                }
                return null;
            },
            
            // 微分 (多項式)
            differentiate(expr) {
                const match = expr.match(/(\d*\.?\d*)x\^?(\d*)/);
                if (match) {
                    let coeff = parseFloat(match[1]) || 1;
                    let exp = parseInt(match[2]) || 1;
                    const newCoeff = coeff * exp;
                    const newExp = exp - 1;
                    if (newExp === 0) return { steps: [`d/dx [${coeff}x^${exp}]`], result: `${newCoeff}` };
                    if (newExp === 1) return { steps: [`d/dx [${coeff}x^${exp}]`], result: `${newCoeff}x` };
                    return { steps: [`d/dx [${coeff}x^${exp}]`], result: `${newCoeff}x^${newExp}` };
                }
                return null;
            },
            
            // 積分 (多項式)
            integrate(expr) {
                const match = expr.match(/(\d*\.?\d*)x\^?(\d*)/);
                if (match) {
                    let coeff = parseFloat(match[1]) || 1;
                    let exp = parseInt(match[2]) || 1;
                    const newExp = exp + 1;
                    const newCoeff = coeff / newExp;
                    return { steps: [`∫${coeff}x^${exp} dx`], result: `${newCoeff}x^${newExp} + C` };
                }
                return null;
            },
            
            // 数列 (等差数列・等比数列)
            sequence(expr) {
                const arith = expr.match(/初項(\d+).*公差(\d+)/);
                if (arith) {
                    const a = parseFloat(arith[1]), d = parseFloat(arith[2]);
                    return { steps: [`等差数列: a₁ = ${a}, d = ${d}`, `一般項: aₙ = ${a} + (n-1)×${d}`], result: `aₙ = ${a} + ${d}(n-1)` };
                }
                const geo = expr.match(/初項(\d+).*公比(\d+)/);
                if (geo) {
                    const a = parseFloat(geo[1]), r = parseFloat(geo[2]);
                    return { steps: [`等比数列: a₁ = ${a}, r = ${r}`, `一般項: aₙ = ${a} × ${r}ⁿ⁻¹`], result: `aₙ = ${a}·${r}^(n-1)` };
                }
                return null;
            },
            
            // ベクトル (内積)
            vector(expr) {
                const match = expr.match(/\((\d+),(\d+)\)\s*[・.]\s*\((\d+),(\d+)\)/);
                if (match) {
                    const a1 = parseFloat(match[1]), a2 = parseFloat(match[2]);
                    const b1 = parseFloat(match[3]), b2 = parseFloat(match[4]);
                    const dot = a1 * b1 + a2 * b2;
                    return { steps: [`a·b = ${a1}×${b1} + ${a2}×${b2}`], result: `内積 = ${dot}` };
                }
                return null;
            },
            
            // 確率 (組み合わせ)
            probability(expr) {
                const match = expr.match(/(\d+)C(\d+)/);
                if (match) {
                    const n = parseInt(match[1]), r = parseInt(match[2]);
                    const fact = (x) => x <= 1 ? 1 : x * fact(x - 1);
                    const comb = fact(n) / (fact(r) * fact(n - r));
                    return { steps: [`${n}C${r} = ${n}! / (${r}! × ${n - r}!)`], result: `= ${comb}` };
                }
                return null;
            },
            
            // 複素数
            complex(expr) {
                const match = expr.match(/(\d+)\s*([+\-])\s*(\d+)i/);
                if (match) {
                    const real = parseFloat(match[1]);
                    const imag = parseFloat(match[3]) * (match[2] === '+' ? 1 : -1);
                    const abs = Math.sqrt(real * real + imag * imag);
                    return { steps: [`|${real} + ${imag}i| = √(${real}² + ${imag}²)`], result: `絶対値 = ${abs.toFixed(4)}` };
                }
                return null;
            },
            
            // メイン処理
            solve(input) {
                const lower = input.toLowerCase();
                
                // 単純計算
                if (/^[\d\s\+\-\*\/\(\)\.πe√sin cos tan log]+$/.test(lower) || /[+\-*/]/.test(lower)) {
                    const val = this.evaluate(input);
                    if (val !== null) return { steps: [`式: ${input}`], result: `= ${val}` };
                }
                // 一次方程式
                if (/=.*[a-z]/i.test(input)) {
                    const linear = this.solveLinear(input);
                    if (linear) return linear;
                }
                // 連立方程式
                if (/[,;].*[a-z]/i.test(input) && input.includes('=')) {
                    const sys = this.solveSystem(input);
                    if (sys) return sys;
                }
                // 二次方程式
                if (/x\^?2/.test(input)) {
                    const quad = this.solveQuadratic(input);
                    if (quad) return quad;
                }
                // 三角関数
                if (/(sin|cos|tan)/.test(input)) {
                    const trig = this.solveTrig(input);
                    if (trig) return trig;
                }
                // 微分
                if (/微分|d\/dx/.test(input)) {
                    const diff = this.differentiate(input);
                    if (diff) return diff;
                }
                // 積分
                if (/積分|∫/.test(input)) {
                    const integ = this.integrate(input);
                    if (integ) return integ;
                }
                // 数列
                if (/(等差数列|等比数列|初項)/.test(input)) {
                    const seq = this.sequence(input);
                    if (seq) return seq;
                }
                // ベクトル
                if (/\(.*\).*\(.*\)/.test(input)) {
                    const vec = this.vector(input);
                    if (vec) return vec;
                }
                // 確率・組み合わせ
                if (/\d+C\d+/.test(input)) {
                    const prob = this.probability(input);
                    if (prob) return prob;
                }
                // 複素数
                if (/\d+\s*[+\-]\s*\d+i/.test(input)) {
                    const cmp = this.complex(input);
                    if (cmp) return cmp;
                }
                return { steps: [], result: null, formula: true };
            }
        };

            const word = input.trim().replace(/[！!？?。、]/g, '');
            if (!shiritoriActive) {
                if (/しりとり/.test(input)) {
                    shiritoriActive = true;
                    shiritoriUsed = new Set(['しりとり']);
                    shiritoriLastKana = 'り';
                    return { type: 'text', content: '🎮 しりとりスタート！\n「り」から始めてください！\n(「終了」で終わります)' };
                }
                return null;
            }
            if (/終了|やめ/.test(input)) {
                shiritoriActive = false;
                return { type: 'text', content: 'しりとりを終了しました！また遊びましょう 😊' };
            }
            const first = word[0];
            if (first !== shiritoriLastKana) {
                return { type: 'text', content: `❌ 「${shiritoriLastKana}」から始めてください！` };
            }
            if (shiritoriUsed.has(word)) {
                return { type: 'text', content: `⚠️ 「${word}」はもう使われました！` };
            }
            const last = word[word.length - 1];
            if (last === 'ん') {
                shiritoriActive = false;
                return { type: 'text', content: `💀 「ん」で終わりました！あなたの勝ちです！\nしりとり終了。` };
            }
            shiritoriUsed.add(word);
            // AIの応答
            const aiWords = ['りんご', 'ごりら', 'らっぱ', 'ぱんだ', 'だいこん', 'こあら', 'らくがき', 'きりん', 'んま'];
            const candidates = aiWords.filter(w => w[0] === last && !shiritoriUsed.has(w));
            const aiWord = candidates.length ? candidates[0] : 'りんご';
            shiritoriUsed.add(aiWord);
            shiritoriLastKana = aiWord[aiWord.length - 1];
            return { type: 'text', content: `「${word}」 → カイ: 「${aiWord}」\n次は「${shiritoriLastKana}」から！` };
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage('user', text);
            input.value = '';
            const reply = await aiResponse(text);
            addMessage('ai', reply);
        }
        
        function updateQuickReplies() {
            const container = document.getElementById('quickReplies');
            if (container) {
                container.innerHTML = [
                    'HTMLでボタン', 'Pythonで計算', 'しりとりしよう',
                    'x²+5x+6=0', 'sin(30°)', '3x²を微分', '(1,2)・(3,4)', '5C2'
                ].map(r => `<span class="qr-btn" onclick="document.getElementById('userInput').value='${r}'; handleSend();">${r}</span>`).join('');
            }
        }
        
        function init() {
            loadSessions();
            loadSkills();
            renderSessionList();
            updateConfigDisplay();
            updateQuickReplies();
            
            document.getElementById('sendBtn').onclick = handleSend;
            document.getElementById('generateBtn').onclick = bulkGenerate;
            document.getElementById('newSessionBtn').onclick = newSession;
            document.getElementById('downloadDataBtn').onclick = downloadProtectedData;
            document.getElementById('exportSkillsBtn').onclick = exportSkills;
            document.getElementById('copyCodeBtn').onclick = copyCode;
            document.getElementById('downloadCodeBtn').onclick = downloadCode;
            document.getElementById('learnFromGitHub').onclick = () => { const url = document.getElementById('githubUrl').value; if (url) learnFromGitHub(url); };
            document.getElementById('openSkillModal').onclick = () => { renderSkillModal(); document.getElementById('skillModal').style.display = 'flex'; };
            document.getElementById('closeSkillModal').onclick = () => document.getElementById('skillModal').style.display = 'none';
            document.getElementById('modalLearnBtn').onclick = () => { const url = document.getElementById('modalGithubUrl').value; if (url) learnFromGitHub(url); };
            document.getElementById('userInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
            
            window.switchSession = switchSession;
            window.toggleSkill = toggleSkill;
            window.deleteSkill = deleteSkill;
            window.handleSend = handleSend;
        }
        
        init();
    })();
</script>
</body>
</html>
