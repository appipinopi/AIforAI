<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE CORE V6 - 学習型AIコード生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Noto Sans JP', monospace;
            background: #0a0c15;
            color: #e4e7f0;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        /* 左パネル */
        .config-panel {
            width: 300px;
            background: #0f121f;
            border-right: 1px solid #1e2438;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow-y: auto;
        }
        .session-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .session-btn {
            background: #1e293b;
            padding: 0.3rem 0.7rem;
            font-size: 0.7rem;
            border-radius: 20px;
            cursor: pointer;
        }
        .session-btn.active {
            background: #3b82f6;
        }
        .new-session-btn {
            background: #10b981;
            width: 100%;
            margin-bottom: 1rem;
        }
        .config-step {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #3b82f6;
        }
        .config-step.completed { border-left-color: #10b981; }
        .config-step.current { border-left-color: #f59e0b; background: #1e2538; }
        .step-title { font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
        .step-status { font-size: 0.7rem; color: #10b981; }
        .step-content { font-size: 0.8rem; color: #9ca3af; word-break: break-word; }
        .generate-btn {
            background: #10b981;
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .generate-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }
        .status-badge {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1rem;
            color: #9ca3af;
        }
        /* 中央チャット */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0c0f1a;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            max-width: 80%;
            animation: fadeIn 0.2s;
        }
        .user-message { align-self: flex-end; }
        .ai-message { align-self: flex-start; }
        .msg-bubble {
            padding: 0.6rem 1rem;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 0.9rem;
        }
        .user-message .msg-bubble { background: #3b82f6; border-bottom-right-radius: 4px; }
        .ai-message .msg-bubble { background: #1a1f2e; border: 1px solid #2d3748; border-bottom-left-radius: 4px; }
        .input-area {
            padding: 1rem;
            background: #0f121f;
            border-top: 1px solid #1e2438;
        }
        .input-group { display: flex; gap: 0.5rem; }
        textarea {
            flex: 1;
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 24px;
            padding: 0.6rem 1rem;
            color: #e4e7f0;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background: #2563eb; transform: scale(1.02); }
        .right-panel {
            width: 45%;
            background: #0f121f;
            border-left: 1px solid #1e2438;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .right-section {
            border-bottom: 1px solid #1e2438;
            padding: 1rem;
        }
        .right-section h4 {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .github-learn {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .github-learn input {
            flex: 1;
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 24px;
            padding: 0.5rem;
            color: white;
        }
        .learned-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }
        .learned-item {
            background: #1e293b;
            padding: 0.3rem;
            margin-bottom: 0.3rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
        .code-viewer {
            background: #0c0f1a;
            padding: 0.8rem;
            overflow: auto;
            flex: 1;
        }
        .code-viewer pre {
            font-family: monospace;
            font-size: 0.7rem;
            white-space: pre-wrap;
        }
        .execution-preview {
            background: #1e1e2e;
            padding: 0.5rem;
            min-height: 120px;
            font-family: monospace;
            font-size: 0.7rem;
        }
        .tab-btn {
            background: #1a1f2e;
            font-size: 0.7rem;
            margin-right: 0.3rem;
        }
        .tab-btn.active { background: #3b82f6; }
        .download-section {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 左: 構成 + セッション管理 -->
    <div class="config-panel">
        <h3 style="margin-bottom: 0.5rem;">📋 会話セッション</h3>
        <div id="sessionList" class="session-buttons"></div>
        <button id="newSessionBtn" class="new-session-btn">✨ 新しい会話を始める</button>
        <div id="stepsContainer"></div>
        <button id="generateBtn" class="generate-btn" disabled>🚀 第6回: 一括コード生成</button>
        <div class="download-section">
            <button id="downloadConversationBtn">💾 会話データ(パスワード保護)</button>
            <button id="exportLearnedBtn">📤 学習データをエクスポート</button>
        </div>
        <div id="learningStatus" class="status-badge">🧠 GitHub学習: 自動更新</div>
    </div>

    <!-- 中央: チャット -->
    <div class="chat-area">
        <div id="messagesContainer" class="messages">
            <div class="message ai-message">
                <div class="msg-bubble">
                    🤖 <strong>CODE CORE V6</strong><br>
                    5回対話→生成。会話の切り替え・GitHub学習・データ保護対応。<br>
                    <strong>【ターン1】</strong> 言語: HTML/CSS/JS, Python, Rust, C/C++, Java, TypeScript
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-group">
                <textarea id="userInput" rows="2" placeholder="メッセージを入力... (Enter送信)"></textarea>
                <button id="sendBtn">📤 送信</button>
            </div>
        </div>
    </div>

    <!-- 右: 学習 + コード表示 -->
    <div class="right-panel">
        <div class="right-section">
            <h4>📚 GitHub URL で学習 (生ファイルのURL)</h4>
            <div class="github-learn">
                <input type="text" id="githubUrlInput" placeholder="https://raw.githubusercontent.com/.../sample.py">
                <button id="learnFromUrlBtn">学習させる</button>
            </div>
            <div id="learnedPatternsList" class="learned-list">読み込み中...</div>
        </div>
        <div class="right-section" style="flex:2; display:flex; flex-direction:column;">
            <div id="previewTabs"></div>
            <div id="codeViewer" class="code-viewer"><pre>まだコードがありません</pre></div>
            <div id="executionPreview" class="execution-preview">💡 実行プレビュー</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- ハッシュ化関数 (SHA-256 簡易版) ----------
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
        }

        // ---------- ストレージキー ----------
        const STORAGE_SESSIONS = 'core_sessions_v6';
        const STORAGE_ACTIVE_SESSION = 'core_active_session_v6';
        const STORAGE_LEARNED = 'core_learned_patterns_v6';

        // 学習パターン (削除不可、エクスポート可)
        let learnedPatterns = [];  // { id, source, url?, content, languageGuess, createdAt }

        // セッション管理
        let sessions = {};   // { sessionId: { config, messages, createdAt, updatedAt } }
        let activeSessionId = null;

        // 現在のセッションの状態への参照
        let currentConfig = { turn:1, language:null, purpose:null, framework:null, dependencies:null, confirmed:false };
        let currentMessages = [];

        // 生成されたファイル
        let generatedFiles = [];
        
        // テンプレート (言語別)
        const templates = {
            html: { name:'HTML/CSS/JS', ext:'.html', generate:(p,f,d)=>`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${p||'App'}</title><style>body{font-family:sans-serif;background:#667eea;display:flex;justify-content:center;align-items:center;height:100vh;}.card{background:white;padding:2rem;border-radius:24px;}</style></head><body><div class="card"><h1>${p||'Sample'}</h1><p>${f||''}</p><p>${d||''}</p><button onclick="alert('Hello')">Click</button></div></body></html>` },
            python:{ name:'Python', ext:'.py', generate:(p,f,d)=>`#!/usr/bin/env python3\n# ${p||'app'}\nprint("Python App")\nname=input("Name: ")\nprint(f"Hello, {name}")` },
            rust:{ name:'Rust', ext:'.rs', generate:(p)=>`fn main() {\n    println!("${p||'Rust App'}");\n    let mut s=String::new();\n    std::io::stdin().read_line(&mut s).unwrap();\n}` },
            c:{ name:'C/C++', ext:'.c', generate:(p)=>`#include <stdio.h>\nint main(){printf("${p||'C App'}\\n");return 0;}` },
            java:{ name:'Java', ext:'.java', generate:(p)=>`public class Main{public static void main(String[] args){System.out.println("${p||'Java App'}");}}` },
            typescript:{ name:'TypeScript', ext:'.ts', generate:(p)=>`console.log("${p||'TS App'}");` }
        };

        // ---------- 永続化 ----------
        function saveAllSessions() {
            const toStore = {};
            for(let [id, sess] of Object.entries(sessions)) {
                toStore[id] = {
                    config: sess.config,
                    messages: sess.messages,
                    createdAt: sess.createdAt,
                    updatedAt: Date.now()
                };
            }
            localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(toStore));
            if(activeSessionId) localStorage.setItem(STORAGE_ACTIVE_SESSION, activeSessionId);
        }

        function loadSessions() {
            const raw = localStorage.getItem(STORAGE_SESSIONS);
            if(raw) {
                try {
                    const obj = JSON.parse(raw);
                    sessions = {};
                    for(let [id, val] of Object.entries(obj)) {
                        sessions[id] = { ...val, config: val.config || { turn:1, language:null, purpose:null, framework:null, dependencies:null, confirmed:false },
                                        messages: val.messages || [] };
                    }
                } catch(e) {}
            }
            if(Object.keys(sessions).length === 0) {
                const newId = Date.now().toString();
                sessions[newId] = {
                    config: { turn:1, language:null, purpose:null, framework:null, dependencies:null, confirmed:false },
                    messages: [{ role:'ai', content:'🤖 CODE CORE V6 起動。5回対話→生成。\n【ターン1】言語を選んでください。' }],
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                activeSessionId = newId;
                saveAllSessions();
            } else {
                const storedActive = localStorage.getItem(STORAGE_ACTIVE_SESSION);
                if(storedActive && sessions[storedActive]) activeSessionId = storedActive;
                else activeSessionId = Object.keys(sessions)[0];
            }
            loadCurrentSessionToMemory();
        }

        function loadCurrentSessionToMemory() {
            if(!activeSessionId || !sessions[activeSessionId]) return;
            const sess = sessions[activeSessionId];
            currentConfig = JSON.parse(JSON.stringify(sess.config));
            currentMessages = [...sess.messages];
            renderMessages();
            updateStepsUI();
            updateGenerateButton();
        }

        function saveCurrentSession() {
            if(!activeSessionId) return;
            sessions[activeSessionId] = {
                ...sessions[activeSessionId],
                config: JSON.parse(JSON.stringify(currentConfig)),
                messages: [...currentMessages],
                updatedAt: Date.now()
            };
            saveAllSessions();
        }

        // セッション切り替え
        function switchSession(id) {
            if(!sessions[id]) return;
            saveCurrentSession(); // 今のを保存
            activeSessionId = id;
            loadCurrentSessionToMemory();
            renderSessionList();
        }

        function newSession() {
            saveCurrentSession();
            const newId = Date.now().toString() + '_' + Math.random();
            sessions[newId] = {
                config: { turn:1, language:null, purpose:null, framework:null, dependencies:null, confirmed:false },
                messages: [{ role:'ai', content:'✨ 新しい会話を開始しました。\n【ターン1】言語を選んでください。' }],
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            activeSessionId = newId;
            loadCurrentSessionToMemory();
            renderSessionList();
            saveAllSessions();
        }

        // ---------- UI 描画 ----------
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if(!container) return;
            container.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.role}-message">
                    <div class="msg-bubble">${msg.content.replace(/\n/g,'<br>')}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content) {
            currentMessages.push({ role, content });
            renderMessages();
            saveCurrentSession();
        }

        function updateStepsUI() {
            const steps = [
                { label:'言語選択', value: currentConfig.language ? (templates[currentConfig.language]?.name||currentConfig.language) : '未選択' },
                { label:'機能・目的', value: currentConfig.purpose || '未入力' },
                { label:'フレームワーク', value: currentConfig.framework || '未入力' },
                { label:'依存関係', value: currentConfig.dependencies || '未入力' },
                { label:'最終確認', value: currentConfig.confirmed ? '✅確認済' : '未確認' }
            ];
            const container = document.getElementById('stepsContainer');
            if(!container) return;
            container.innerHTML = steps.map((step,idx)=>{
                const stepNum=idx+1;
                const isCompleted = (currentConfig.turn > stepNum) || (stepNum===5 && currentConfig.confirmed);
                const isCurrent = currentConfig.turn === stepNum && !(stepNum===5 && currentConfig.confirmed);
                return `<div class="config-step ${isCompleted?'completed':''} ${isCurrent?'current':''}">
                    <div class="step-title"><span>${stepNum}. ${step.label}</span><span class="step-status">${isCompleted?'✓':(stepNum===currentConfig.turn?'●':'○')}</span></div>
                    <div class="step-content">${step.value}</div>
                </div>`;
            }).join('');
            const genBtn = document.getElementById('generateBtn');
            if(genBtn) genBtn.disabled = !currentConfig.confirmed;
        }

        function updateGenerateButton() {
            const btn = document.getElementById('generateBtn');
            if(btn) btn.disabled = !currentConfig.confirmed;
        }

        function renderSessionList() {
            const container = document.getElementById('sessionList');
            if(!container) return;
            const sessionIds = Object.keys(sessions).sort((a,b)=>sessions[b].updatedAt - sessions[a].updatedAt);
            container.innerHTML = sessionIds.map(id => `
                <button class="session-btn ${id===activeSessionId?'active':''}" data-id="${id}">
                    ${new Date(sessions[id].createdAt).toLocaleTimeString()} 
                    (${sessions[id].messages.length}件)
                </button>
            `).join('');
            document.querySelectorAll('.session-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    if(id) switchSession(id);
                });
            });
        }

        // ---------- AI 応答 (5ターン) ----------
        async function aiResponse(userMsg) {
            const lower = userMsg.trim().toLowerCase();
            let reply = '';
            const cfg = currentConfig;
            switch(cfg.turn) {
                case 1:
                    const langMap = { html:'html',css:'html',javascript:'html',js:'html', python:'python',py:'python', rust:'rust',rs:'rust', c:'c','c++':'c',cpp:'c', java:'java', typescript:'typescript',ts:'typescript' };
                    let detected = null;
                    for(let [k,v] of Object.entries(langMap)) if(lower.includes(k)) { detected=v; break; }
                    if(detected) {
                        cfg.language = detected;
                        reply = `✅ 言語「${templates[detected]?.name||detected}」選択。\n【ターン2】どんなアプリを作りたいですか？`;
                        cfg.turn = 2;
                    } else { reply = `【ターン1】言語: HTML/CSS/JS, Python, Rust, C/C++, Java, TypeScript`; }
                    break;
                case 2:
                    cfg.purpose = userMsg;
                    reply = `✅ 目的記録。\n【ターン3】フレームワークは？ (例: Flask, React, なし)`;
                    cfg.turn = 3;
                    break;
                case 3:
                    cfg.framework = userMsg;
                    reply = `✅ フレームワーク記録。\n【ターン4】依存関係は？ (例: Docker, PostgreSQL, なし)`;
                    cfg.turn = 4;
                    break;
                case 4:
                    cfg.dependencies = userMsg;
                    reply = `✅ 依存関係記録。\n【ターン5】最終確認:\n📌言語:${templates[cfg.language]?.name}\n📌目的:${cfg.purpose}\n📌FW:${cfg.framework}\n📌依存:${cfg.dependencies}\n\n「はい」で確定、「いいえ」で最初から。`;
                    cfg.turn = 5;
                    break;
                case 5:
                    if(lower.includes('はい')||lower.includes('ok')||lower.includes('確定')) {
                        cfg.confirmed = true;
                        reply = `✅ 構成確定！右下「第6回: 一括コード生成」ボタンを押してください。`;
                    } else if(lower.includes('いいえ')||lower.includes('最初から')) {
                        Object.assign(cfg, { turn:1, language:null, purpose:null, framework:null, dependencies:null, confirmed:false });
                        reply = `最初から。\n【ターン1】言語を選んでください。`;
                    } else { reply = `「はい」で確定、「いいえ」で最初から。`; }
                    break;
                default: reply = `構成確定済みです。生成ボタンを押してください。`;
            }
            updateStepsUI();
            saveCurrentSession();
            return reply;
        }

        // コード生成
        function generateCode() {
            const lang = currentConfig.language;
            const tmpl = templates[lang];
            if(!tmpl) return [{ name:'output.txt', content:'未対応言語', language:'text' }];
            const code = tmpl.generate(currentConfig.purpose, currentConfig.framework, currentConfig.dependencies);
            return [{ name:`main${tmpl.ext}`, content:code, language:lang }];
        }

        function renderCodeAndPreview(files, lang) {
            const tabsDiv = document.getElementById('previewTabs');
            if(tabsDiv) {
                tabsDiv.innerHTML = files.map((f,i)=>`<button class="tab-btn ${i===0?'active':''}" data-idx="${i}">📄 ${f.name}</button>`).join('');
                document.querySelectorAll('.tab-btn').forEach(btn=>{
                    btn.addEventListener('click',()=>{
                        const idx = parseInt(btn.getAttribute('data-idx'));
                        document.getElementById('codeViewer').innerHTML = `<pre>${escapeHtml(files[idx].content)}</pre>`;
                        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                        btn.classList.add('active');
                        if(lang==='html' && files[idx].name.endsWith('.html')) {
                            document.getElementById('executionPreview').innerHTML = `<iframe srcdoc="${escapeHtml(files[idx].content).replace(/"/g,'&quot;')}" style="width:100%;height:100%;border:none;"></iframe>`;
                        } else {
                            document.getElementById('executionPreview').innerHTML = `<div class="execution-preview">${escapeHtml(files[idx].content.slice(0,500))}</div>`;
                        }
                    });
                });
            }
            document.getElementById('codeViewer').innerHTML = `<pre>${escapeHtml(files[0].content)}</pre>`;
            if(lang==='html') {
                document.getElementById('executionPreview').innerHTML = `<iframe srcdoc="${escapeHtml(files[0].content).replace(/"/g,'&quot;')}" style="width:100%;height:100%;border:none;"></iframe>`;
            } else {
                document.getElementById('executionPreview').innerHTML = `<div class="execution-preview">${escapeHtml(files[0].content.slice(0,500))}</div>`;
            }
        }

        function bulkGenerate() {
            if(!currentConfig.confirmed) { alert('5回対話を完了し、「はい」で確定させてからボタンを押してください。'); return; }
            const files = generateCode();
            generatedFiles = files;
            renderCodeAndPreview(files, currentConfig.language);
            addMessage('ai', `✨ 一括生成完了！ ${files.length}ファイル生成。`);
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        // ---------- 学習データ管理 (削除不可) ----------
        function loadLearnedPatterns() {
            const stored = localStorage.getItem(STORAGE_LEARNED);
            if(stored) {
                try { learnedPatterns = JSON.parse(stored); } catch(e){ learnedPatterns=[]; }
            }
            if(!learnedPatterns.length) {
                learnedPatterns = [{ id:'builtin1', source:'builtin', content:'# 初期学習パターン', languageGuess:'python', createdAt:Date.now() }];
                saveLearnedPatterns();
            }
            renderLearnedList();
        }
        function saveLearnedPatterns() {
            localStorage.setItem(STORAGE_LEARNED, JSON.stringify(learnedPatterns));
            renderLearnedList();
        }
        function renderLearnedList() {
            const container = document.getElementById('learnedPatternsList');
            if(!container) return;
            if(learnedPatterns.length===0) { container.innerHTML='学習データなし'; return; }
            container.innerHTML = learnedPatterns.map(p => `<div class="learned-item"><span>📘 ${p.source==='github'?'GitHub':'builtin'} ${p.url?p.url.slice(0,40):p.id}</span><span>🔒</span></div>`).join('');
        }
        async function learnFromUrl(url) {
            if(!url.trim()) return;
            try {
                const response = await fetch(url);
                if(!response.ok) throw new Error(`HTTP ${response.status}`);
                const content = await response.text();
                const langGuess = url.includes('.py')?'python':url.includes('.rs')?'rust':url.includes('.c')?'c':url.includes('.java')?'java':url.includes('.ts')?'typescript':'html';
                const newPattern = {
                    id: Date.now()+'_'+Math.random(),
                    source: 'github',
                    url: url,
                    content: content.slice(0,5000),
                    languageGuess: langGuess,
                    createdAt: Date.now()
                };
                learnedPatterns.push(newPattern);
                saveLearnedPatterns();
                alert(`✅ GitHubから学習しました (${content.length} 文字)`);
            } catch(e) { alert(`学習失敗: ${e.message}`); }
        }

        // ---------- 会話データダウンロード (パスワードハッシュ化) ----------
        async function downloadConversationWithPassword() {
            const password = prompt("会話データを保護するパスワードを入力してください (任意ですがハッシュ化して保存)");
            if(password === null) return;
            const hash = password ? await sha256(password) : "no_password";
            const exportData = {
                version: "V6",
                exportedAt: new Date().toISOString(),
                passwordHash: hash,
                sessions: sessions,
                activeSessionId: activeSessionId,
                learnedPatterns: learnedPatterns  // 学習データも含める
            };
            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], {type:"application/json"});
            const a = document.createElement('a');
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = `codecore_conversation_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert("会話データをダウンロードしました（パスワードはハッシュ化して保存）");
        }

        function exportLearnedOnly() {
            const exportData = {
                version: "V6",
                exportedAt: new Date().toISOString(),
                learnedPatterns: learnedPatterns
            };
            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], {type:"application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `codecore_learned_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            alert("学習データをエクスポートしました");
        }

        // ---------- 送信処理 ----------
        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;
            addMessage('user', text);
            input.value = '';
            const reply = await aiResponse(text);
            addMessage('ai', reply);
            saveCurrentSession();
            renderSessionList();
        }

        // ---------- 初期化 ----------
        function init() {
            loadSessions();
            loadLearnedPatterns();
            renderSessionList();

            document.getElementById('sendBtn').onclick = handleSend;
            document.getElementById('generateBtn').onclick = bulkGenerate;
            document.getElementById('newSessionBtn').onclick = newSession;
            document.getElementById('downloadConversationBtn').onclick = downloadConversationWithPassword;
            document.getElementById('exportLearnedBtn').onclick = exportLearnedOnly;
            document.getElementById('learnFromUrlBtn').onclick = () => {
                const url = document.getElementById('githubUrlInput').value;
                learnFromUrl(url);
            };
            document.getElementById('userInput').addEventListener('keydown', (e) => {
                if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
            });
        }

        init();
    })();
</script>
</body>
</html>
